# electron-builder.yml
appId: com.globalradio.app
productName: 全球电台
directories:
  output: release

# 关键：明确指定要打包的文件
files:
  - dist/**/*
  - electron/**/*

# 确保入口文件被包含
extraResources:
  - from: electron/
    to: electron/
    filter:
      - "**/*"

# 强制指定入口
extraMetadata:
  main: electron/main.js

win:
  target:
    - nsis
    - portable
  icon: public/favicon.ico

mac:
  target:
    - dmg
    - zip
  icon: public/icon.icns

linux:
  target:
    - AppImage
    - deb
  icon: public/icon.png
  category: AudioVideo

nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
