name: Nightly Build

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  NODE_VERSION: 20

jobs:
  nightly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: 确保锁文件存在
        shell: bash
        run: |
          if [ ! -f package-lock.json ]; then
            npm install --package-lock-only
          fi
      - name: 安装依赖
        shell: bash
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund
      - name: 构建
        shell: bash
        run: npm run build
      - name: 验证
        shell: bash
        run: test -f dist/index.html && echo "✅ 每日构建成功"
      - uses: actions/upload-artifact@v4
        with:
          name: nightly-build
          path: dist/
