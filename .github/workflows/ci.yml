name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  NODE_VERSION: 20

jobs:
  # 1. 构建验证 (Web)
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: 安装依赖
        run: npm install --no-audit --no-fund
      - name: 构建 Web
        run: npm run build
      - name: 验证构建产物
        run: test -f dist/index.html || (echo "❌ dist/index.html 不存在" && exit 1)
      - name: 上传构建产物（用于调试）
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: web-dist-failed
          path: dist/

  # 2. Electron 构建验证
  build-electron:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: 安装依赖
        run: npm install --no-audit --no-fund
      - name: 检查 Electron 文件
        run: |
          if [ ! -f "electron/main.js" ]; then
            echo "⚠️ electron/main.js 不存在，跳过 Electron 构建"
            exit 0
          fi
      - name: 构建 Web
        if: hashFiles('electron/main.js') != ''
        run: npm run build
      - name: 构建 Electron (仅验证)
        if: hashFiles('electron/main.js') != ''
        run: npx electron-builder --linux --dir
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 3. Android 构建验证
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: 安装依赖
        run: npm install --no-audit --no-fund
      - name: 构建 Web
        run: npm run build
      - name: 检查 Capacitor
        run: |
          if [ ! -f "capacitor.config.ts" ] && [ ! -f "capacitor.config.js" ]; then
            echo "⚠️ Capacitor 未配置，跳过 Android 构建"
            exit 0
          fi
      - name: 同步 Capacitor
        if: hashFiles('capacitor.config.*') != ''
        run: npx cap sync android
      - name: 构建 APK
        if: hashFiles('capacitor.config.*') != ''
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

  # 4. 状态汇总
  ci-status:
    runs-on: ubuntu-latest
    needs: [build-web, build-electron, build-android]
    if: always()
    steps:
      - name: 检查所有任务结果
        run: |
          echo "📊 构建状态汇总："
          echo "  Web: ${{ needs.build-web.result }}"
          echo "  Electron: ${{ needs.build-electron.result }}"
          echo "  Android: ${{ needs.build-android.result }}"
          if [[ "${{ needs.build-web.result }}" != "success" ]]; then
            echo "❌ Web 构建失败"
            exit 1
          fi
          echo "✅ 核心构建通过"
