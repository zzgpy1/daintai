name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # 1. 构建Web产物
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: 验证构建产物
        run: |
          ls -la dist/
          test -f dist/index.html || (echo "index.html不存在" && exit 1)
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/

  # 2. 构建Electron桌面端 (修正)
  build-electron:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
      - run: npm ci
      - name: 验证Electron入口文件
        run: |
          test -f electron/main.js || (echo "electron/main.js不存在" && exit 1)
          test -f electron/preload.js || (echo "electron/preload.js不存在" && exit 1)
      - run: npm run build
      - name: 验证构建产物
        run: |
          ls -la dist/
          test -f dist/index.html || (echo "dist/index.html不存在" && exit 1)
      - name: 构建Electron应用
        run: npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: electron-${{ matrix.os }}
          path: release/

  # 3. 构建Android APK (修正)
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - run: npm ci
      - run: npm run build
      - name: 验证Capacitor配置
        run: |
          test -f capacitor.config.ts || (echo "capacitor.config.ts不存在" && exit 1)
      - name: 同步Capacitor
        run: npx cap sync android
      - name: 验证Android项目
        run: |
          cd android
          test -f gradlew || (echo "gradlew不存在，尝试重新添加Android平台" && cd .. && npx cap add android)
      - name: 构建APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
      - name: 验证APK
        run: |
          ls -la android/app/build/outputs/apk/release/
          test -f android/app/build/outputs/apk/release/*.apk || (echo "APK构建失败" && exit 1)
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/release/*.apk

  # 4. 创建GitHub Release
  create-release:
    needs: [build-web, build-electron, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: 生成Release Notes
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          cat > RELEASE_NOTES.md << EOF
          # 全球电台 v${VERSION}

          ## 📦 下载说明
          请根据您的操作系统选择对应的安装包：

          ### 🖥️ Windows
          - \`global-radio-${VERSION}-win-setup.exe\` - 安装版
          - \`global-radio-${VERSION}-win-portable.exe\` - 便携版

          ### 🍎 macOS
          - \`global-radio-${VERSION}-mac.dmg\` - DMG安装包
          - \`global-radio-${VERSION}-mac.zip\` - ZIP压缩包

          ### 🐧 Linux
          - \`global-radio-${VERSION}-linux.AppImage\` - AppImage
          - \`global-radio-${VERSION}-linux.deb\` - DEB安装包

          ### 📱 Android
          - \`app-release-${VERSION}.apk\` - APK安装包

          ### 🌐 Web
          - Web版本已部署到演示站点

          ---
          感谢使用全球电台！如有问题请反馈至 [Issues](https://github.com/moli-xia/global-radio/issues)
          EOF
          cat RELEASE_NOTES.md
      - name: 创建Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.zip
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
