name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '手动指定标签 (如 v1.0.0)'
        required: false
        default: ''

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  NODE_VERSION: 20
  DOCKER_IMAGE: superneed/global-radio
  DOCKER_IMAGE_ARM64: superneed/global-radio-arm64

jobs:
  # 1. 验证项目结构
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 验证项目结构
        run: bash scripts/verify-project.sh

  # 2. 构建 Web 产物
  build-web:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: 安装依赖
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund
      - name: 构建 Web
        run: npm run build
      - name: 验证构建产物
        run: test -f dist/index.html || (echo "❌ dist/index.html 不存在" && exit 1)
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/

  # 3. 构建 Electron 桌面端 (多平台)
  build-electron:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: 安装依赖
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund
      - name: 构建 Vue
        run: npm run build
      - name: 构建 Electron
        run: npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: electron-${{ matrix.os }}
          path: release/

  # 4. 构建 Android APK
  build-android:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: 安装依赖
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund
      - name: 构建 Vue
        run: npm run build
      - name: 初始化 Capacitor
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
      - name: 同步 Capacitor
        run: npx cap sync android
      - name: 构建 Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/release/*.apk

  # 5. 构建 Docker 镜像 (AMD64 和 ARM64)
  build-docker:
    runs-on: ubuntu-latest
    needs: build-web
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - name: 下载 Web 构建产物
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist/
      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: 构建并推送 AMD64 镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.ref_name }}
      - name: 构建并推送 ARM64 镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE_ARM64 }}:latest
            ${{ env.DOCKER_IMAGE_ARM64 }}:${{ github.ref_name }}

  # 6. 创建 GitHub Release
  create-release:
    needs: [build-web, build-electron, build-android, build-docker]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - name: 整理产物目录
        run: |
          mkdir -p release-assets
          find artifacts/ -type f -exec cp {} release-assets/ \;
          ls -la release-assets/
      - name: 生成 Release Notes
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          cat > RELEASE_NOTES.md << 'EOF'
          # 全球电台 v${VERSION}

          ## 📦 下载说明
          请根据您的操作系统选择对应的安装包：

          ### 🖥️ Windows
          - `global-radio-${VERSION}-win-setup.exe` - 安装版
          - `global-radio-${VERSION}-win-portable.exe` - 便携版

          ### 🍎 macOS
          - `global-radio-${VERSION}-mac.dmg` - DMG 安装包
          - `global-radio-${VERSION}-mac.zip` - ZIP 压缩包

          ### 🐧 Linux
          - `global-radio-${VERSION}-linux.AppImage` - AppImage
          - `global-radio-${VERSION}-linux.deb` - DEB 安装包

          ### 📱 Android
          - `app-release-${VERSION}.apk` - APK 安装包

          ### 🐳 Docker
          - `docker pull superneed/global-radio:${VERSION}`
          - `docker pull superneed/global-radio-arm64:${VERSION}`

          ### 🌐 Web
          - 在线演示: https://aabb.live

          ---
          感谢使用全球电台！如有问题请反馈至 [Issues](https://github.com/moli-xia/global-radio/issues)
          EOF
          sed -i "s/\${VERSION}/${VERSION}/g" RELEASE_NOTES.md
          cat RELEASE_NOTES.md
      - name: 创建 Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
          files: |
            release-assets/*.zip
            release-assets/*.exe
            release-assets/*.dmg
            release-assets/*.AppImage
            release-assets/*.deb
            release-assets/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 7. 可选：自动部署到演示服务器 (示例)
  deploy-demo:
    runs-on: ubuntu-latest
    needs: [build-web, build-docker]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: 通过 SSH 部署到服务器
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            docker pull superneed/global-radio:latest
            docker rm -f global-radio || true
            docker run -d --name global-radio --restart unless-stopped -p 8080:80 superneed/global-radio:latest
