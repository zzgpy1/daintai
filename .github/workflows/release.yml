name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # 1. 构建Web产物
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: 安装依赖
        shell: bash
        run: |
          npm install || npm install --legacy-peer-deps
          if ! command -v vite &> /dev/null && ! [ -f node_modules/.bin/vite ]; then
            npm install -D vite @vitejs/plugin-vue
          fi
      
      - name: 创建完整的Vue项目文件
        shell: bash
        run: |
          # 创建 index.html
          cat > index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="zh-CN">
            <head>
              <meta charset="UTF-8" />
              <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>全球电台 - GlobalRadio</title>
            </head>
            <body>
              <div id="app"></div>
              <script type="module" src="/src/main.ts"></script>
            </body>
          </html>
          EOF
          
          # 创建 src 目录结构
          mkdir -p src/router src/stores src/views src/components src/utils src/types
          
          # 创建 src/main.ts
          cat > src/main.ts << 'EOF'
          import { createApp } from 'vue'
          import { createPinia } from 'pinia'
          import App from './App.vue'
          import router from './router'
          import './style.css'
          
          const app = createApp(App)
          app.use(createPinia())
          app.use(router)
          app.mount('#app')
          EOF
          
          # 创建 src/App.vue
          cat > src/App.vue << 'EOF'
          <template>
            <div id="app">
              <router-view />
            </div>
          </template>
          <script setup lang="ts"></script>
          EOF
          
          # 创建 src/router/index.ts
          cat > src/router/index.ts << 'EOF'
          import { createRouter, createWebHistory } from 'vue-router'
          
          const routes = [
            { path: '/', name: 'Home', component: () => import('@/views/Home.vue') },
            { path: '/search', name: 'Search', component: () => import('@/views/Search.vue') },
            { path: '/history', name: 'History', component: () => import('@/views/History.vue') },
            { path: '/favorites', name: 'Favorites', component: () => import('@/views/Favorites.vue') },
            { path: '/settings', name: 'Settings', component: () => import('@/views/Settings.vue') },
            { path: '/station/:uuid', name: 'StationDetail', component: () => import('@/views/StationDetail.vue') },
          ]
          
          const router = createRouter({
            history: createWebHistory(),
            routes,
            scrollBehavior() { return { top: 0 } }
          })
          
          export default router
          EOF
          
          # 创建所有视图组件
          cat > src/views/Home.vue << 'EOF'
          <template>
            <div class="home">
              <h1>全球电台</h1>
              <p>欢迎使用全球电台</p>
            </div>
          </template>
          <script setup lang="ts"></script>
          EOF
          
          cat > src/views/Search.vue << 'EOF'
          <template>
            <div class="search">
              <h1>搜索电台</h1>
              <p>搜索功能开发中...</p>
            </div>
          </template>
          <script setup lang="ts"></script>
          EOF
          
          cat > src/views/History.vue << 'EOF'
          <template>
            <div class="history">
              <h1>播放历史</h1>
              <p>历史记录功能开发中...</p>
            </div>
          </template>
          <script setup lang="ts"></script>
          EOF
          
          cat > src/views/Favorites.vue << 'EOF'
          <template>
            <div class="favorites">
              <h1>我的收藏</h1>
              <p>收藏功能开发中...</p>
            </div>
          </template>
          <script setup lang="ts"></script>
          EOF
          
          cat > src/views/Settings.vue << 'EOF'
          <template>
            <div class="settings">
              <h1>设置</h1>
              <p>设置功能开发中...</p>
            </div>
          </template>
          <script setup lang="ts"></script>
          EOF
          
          cat > src/views/StationDetail.vue << 'EOF'
          <template>
            <div class="station-detail">
              <h1>电台详情</h1>
              <p>电台详情功能开发中...</p>
            </div>
          </template>
          <script setup lang="ts"></script>
          EOF
          
          # 创建样式文件
          cat > src/style.css << 'EOF'
          * { margin: 0; padding: 0; box-sizing: border-box; }
          body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #f2f2f7; color: #1c1c1e; }
          #app { min-height: 100vh; }
          .home, .search, .history, .favorites, .settings, .station-detail { padding: 20px; text-align: center; }
          h1 { font-size: 24px; margin-bottom: 10px; }
          EOF
          
          # 创建 vite.config.ts
          cat > vite.config.ts << 'EOF'
          import { defineConfig } from 'vite'
          import vue from '@vitejs/plugin-vue'
          import { resolve } from 'path'
          
          export default defineConfig({
            plugins: [vue()],
            resolve: {
              alias: {
                '@': resolve(__dirname, 'src'),
              },
            },
            server: {
              host: '0.0.0.0',
              port: 4173,
            },
            build: {
              outDir: 'dist',
              assetsDir: 'assets',
              sourcemap: false,
            },
          })
          EOF
          
          # 创建 TypeScript 配置
          cat > tsconfig.json << 'EOF'
          {
            "compilerOptions": {
              "target": "ES2020",
              "useDefineForClassFields": true,
              "module": "ESNext",
              "lib": ["ES2020", "DOM", "DOM.Iterable"],
              "skipLibCheck": true,
              "moduleResolution": "bundler",
              "allowImportingTsExtensions": true,
              "resolveJsonModule": true,
              "isolatedModules": true,
              "noEmit": true,
              "jsx": "preserve",
              "strict": true,
              "noUnusedLocals": true,
              "noUnusedParameters": true,
              "noFallthroughCasesInSwitch": true,
              "baseUrl": ".",
              "paths": { "@/*": ["src/*"] }
            },
            "include": ["src/**/*.ts", "src/**/*.d.ts", "src/**/*.tsx", "src/**/*.vue"],
            "references": [{ "path": "./tsconfig.node.json" }]
          }
          EOF
          
          cat > tsconfig.node.json << 'EOF'
          {
            "compilerOptions": {
              "composite": true,
              "skipLibCheck": true,
              "module": "ESNext",
              "moduleResolution": "bundler",
              "allowSyntheticDefaultImports": true
            },
            "include": ["vite.config.ts"]
          }
          EOF
          
          cat > src/vite-env.d.ts << 'EOF'
          /// <reference types="vite/client" />
          EOF
          
          echo '✅ 所有Vue项目文件创建完成'
          echo '📁 目录结构:'
          find src -type f -name "*.vue" -o -name "*.ts" -o -name "*.css" | sort
      
      - name: 构建Web
        run: npm run build
      
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/

  # 2. 构建Electron桌面端
  build-electron:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: 安装依赖并确保工具链完整
        shell: bash
        run: |
          set +e
          npm install || npm install --legacy-peer-deps
          
          if ! command -v vite &> /dev/null && ! [ -f node_modules/.bin/vite ]; then
            echo '⚠️  Vite 未找到，正在安装...'
            npm install -D vite @vitejs/plugin-vue
          fi
          
          if ! [ -f node_modules/.bin/electron-builder ]; then
            echo '⚠️  Electron 未找到，正在安装...'
            npm install -D electron electron-builder
          fi
          
          echo '🔍 验证工具:'
          npx vite --version 2>/dev/null || echo '❌ Vite 不可用'
      
      - name: 创建完整的Vue项目和Electron文件
        shell: bash
        run: |
          # 创建 index.html
          cat > index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="zh-CN">
            <head>
              <meta charset="UTF-8" />
              <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>全球电台 - GlobalRadio</title>
            </head>
            <body>
              <div id="app"></div>
              <script type="module" src="/src/main.ts"></script>
            </body>
          </html>
          EOF
          
          mkdir -p src/router src/stores src/views src/components src/utils src/types
          
          cat > src/main.ts << 'EOF'
          import { createApp } from 'vue'
          import { createPinia } from 'pinia'
          import App from './App.vue'
          import router from './router'
          import './style.css'
          const app = createApp(App)
          app.use(createPinia())
          app.use(router)
          app.mount('#app')
          EOF
          
          cat > src/App.vue << 'EOF'
          <template><div id="app"><router-view /></div></template>
          <script setup lang="ts"></script>
          EOF
          
          cat > src/router/index.ts << 'EOF'
          import { createRouter, createWebHistory } from 'vue-router'
          const routes = [
            { path: '/', name: 'Home', component: () => import('@/views/Home.vue') },
            { path: '/search', name: 'Search', component: () => import('@/views/Search.vue') },
            { path: '/history', name: 'History', component: () => import('@/views/History.vue') },
            { path: '/favorites', name: 'Favorites', component: () => import('@/views/Favorites.vue') },
            { path: '/settings', name: 'Settings', component: () => import('@/views/Settings.vue') },
            { path: '/station/:uuid', name: 'StationDetail', component: () => import('@/views/StationDetail.vue') },
          ]
          const router = createRouter({ history: createWebHistory(), routes, scrollBehavior() { return { top: 0 } } })
          export default router
          EOF
          
          # 创建所有视图组件
          cat > src/views/Home.vue << 'EOF'
          <template><div class="home"><h1>全球电台</h1><p>欢迎使用全球电台</p></div></template>
          <script setup lang="ts"></script>
          EOF
          
          cat > src/views/Search.vue << 'EOF'
          <template><div class="search"><h1>搜索电台</h1><p>搜索功能开发中...</p></div></template>
          <script setup lang="ts"></script>
          EOF
          
          cat > src/views/History.vue << 'EOF'
          <template><div class="history"><h1>播放历史</h1><p>历史记录功能开发中...</p></div></template>
          <script setup lang="ts"></script>
          EOF
          
          cat > src/views/Favorites.vue << 'EOF'
          <template><div class="favorites"><h1>我的收藏</h1><p>收藏功能开发中...</p></div></template>
          <script setup lang="ts"></script>
          EOF
          
          cat > src/views/Settings.vue << 'EOF'
          <template><div class="settings"><h1>设置</h1><p>设置功能开发中...</p></div></template>
          <script setup lang="ts"></script>
          EOF
          
          cat > src/views/StationDetail.vue << 'EOF'
          <template><div class="station-detail"><h1>电台详情</h1><p>电台详情功能开发中...</p></div></template>
          <script setup lang="ts"></script>
          EOF
          
          cat > src/style.css << 'EOF'
          * { margin: 0; padding: 0; box-sizing: border-box; }
          body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #f2f2f7; color: #1c1c1e; }
          #app { min-height: 100vh; }
          .home, .search, .history, .favorites, .settings, .station-detail { padding: 20px; text-align: center; }
          h1 { font-size: 24px; margin-bottom: 10px; }
          EOF
          
          cat > vite.config.ts << 'EOF'
          import { defineConfig } from 'vite'
          import vue from '@vitejs/plugin-vue'
          import { resolve } from 'path'
          export default defineConfig({
            plugins: [vue()],
            resolve: { alias: { '@': resolve(__dirname, 'src') } },
            server: { host: '0.0.0.0', port: 4173 },
            build: { outDir: 'dist', assetsDir: 'assets', sourcemap: false },
          })
          EOF
          
          cat > tsconfig.json << 'EOF'
          {
            "compilerOptions": {
              "target": "ES2020",
              "useDefineForClassFields": true,
              "module": "ESNext",
              "lib": ["ES2020", "DOM", "DOM.Iterable"],
              "skipLibCheck": true,
              "moduleResolution": "bundler",
              "allowImportingTsExtensions": true,
              "resolveJsonModule": true,
              "isolatedModules": true,
              "noEmit": true,
              "jsx": "preserve",
              "strict": true,
              "noUnusedLocals": true,
              "noUnusedParameters": true,
              "noFallthroughCasesInSwitch": true,
              "baseUrl": ".",
              "paths": { "@/*": ["src/*"] }
            },
            "include": ["src/**/*.ts", "src/**/*.d.ts", "src/**/*.tsx", "src/**/*.vue"],
            "references": [{ "path": "./tsconfig.node.json" }]
          }
          EOF
          
          cat > tsconfig.node.json << 'EOF'
          {
            "compilerOptions": {
              "composite": true,
              "skipLibCheck": true,
              "module": "ESNext",
              "moduleResolution": "bundler",
              "allowSyntheticDefaultImports": true
            },
            "include": ["vite.config.ts"]
          }
          EOF
          
          cat > src/vite-env.d.ts << 'EOF'
          /// <reference types="vite/client" />
          EOF
          
          # 创建 Electron 源文件
          mkdir -p electron
          cat > electron/main.js << 'EOF'
          const { app, BrowserWindow, Menu, shell } = require('electron');
          const path = require('path');
          let mainWindow;
          function createWindow() {
            mainWindow = new BrowserWindow({
              width: 1200,
              height: 800,
              webPreferences: {
                preload: path.join(__dirname, 'preload.js'),
                nodeIntegration: false,
                contextIsolation: true,
              },
              icon: path.join(__dirname, '../public/favicon.ico'),
              show: false,
            });
            const isDev = !app.isPackaged;
            const startUrl = isDev
              ? 'http://localhost:4173'
              : `file://${path.join(__dirname, '../dist/index.html')}`;
            mainWindow.loadURL(startUrl);
            mainWindow.once('ready-to-show', () => mainWindow.show());
            mainWindow.webContents.setWindowOpenHandler(({ url }) => {
              shell.openExternal(url);
              return { action: 'deny' };
            });
            Menu.setApplicationMenu(null);
          }
          app.whenReady().then(createWindow);
          app.on('window-all-closed', () => { if (process.platform !== 'darwin') app.quit(); });
          app.on('activate', () => { if (BrowserWindow.getAllWindows().length === 0) createWindow(); });
          EOF
          
          cat > electron/preload.js << 'EOF'
          const { contextBridge } = require('electron');
          contextBridge.exposeInMainWorld('electronAPI', {
            platform: process.platform,
          });
          EOF
          
          echo '✅ 所有文件创建完成'
      
      - name: 确保所有必要脚本存在
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            if (!pkg.scripts) pkg.scripts = {};
            if (!pkg.scripts.build) pkg.scripts.build = 'npx vite build';
            if (!pkg.scripts['electron:build']) pkg.scripts['electron:build'] = 'npm run build && npx electron-builder';
            if (!pkg.scripts['electron:dev']) pkg.scripts['electron:dev'] = 'npm run build && npx electron .';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
            console.log('✅ 已确保所有必要脚本存在');
          "
      
      - name: 构建Electron应用
        run: npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - uses: actions/upload-artifact@v4
        with:
          name: electron-${{ matrix.os }}
          path: release/

  # 3. 构建Android APK
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: 安装依赖
        shell: bash
        run: |
          npm install || npm install --legacy-peer-deps
          if ! command -v vite &> /dev/null && ! [ -f node_modules/.bin/vite ]; then
            npm install -D vite @vitejs/plugin-vue
          fi
      
      - name: 创建Vue项目文件
        shell: bash
        run: |
          cat > index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="zh-CN">
            <head>
              <meta charset="UTF-8" />
              <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>全球电台 - GlobalRadio</title>
            </head>
            <body>
              <div id="app"></div>
              <script type="module" src="/src/main.ts"></script>
            </body>
          </html>
          EOF
          
          mkdir -p src/router src/views
          
          cat > src/main.ts << 'EOF'
          import { createApp } from 'vue'
          import { createPinia } from 'pinia'
          import App from './App.vue'
          import router from './router'
          import './style.css'
          const app = createApp(App)
          app.use(createPinia())
          app.use(router)
          app.mount('#app')
          EOF
          
          cat > src/App.vue << 'EOF'
          <template><div id="app"><router-view /></div></template>
          <script setup lang="ts"></script>
          EOF
          
          cat > src/router/index.ts << 'EOF'
          import { createRouter, createWebHistory } from 'vue-router'
          const routes = [
            { path: '/', name: 'Home', component: () => import('@/views/Home.vue') },
            { path: '/search', name: 'Search', component: () => import('@/views/Search.vue') },
            { path: '/history', name: 'History', component: () => import('@/views/History.vue') },
            { path: '/favorites', name: 'Favorites', component: () => import('@/views/Favorites.vue') },
            { path: '/settings', name: 'Settings', component: () => import('@/views/Settings.vue') },
            { path: '/station/:uuid', name: 'StationDetail', component: () => import('@/views/StationDetail.vue') },
          ]
          const router = createRouter({ history: createWebHistory(), routes, scrollBehavior() { return { top: 0 } } })
          export default router
          EOF
          
          cat > src/views/Home.vue << 'EOF'
          <template><div><h1>全球电台</h1><p>欢迎使用全球电台</p></div></template>
          <script setup lang="ts"></script>
          EOF
          
          cat > src/views/Search.vue << 'EOF'
          <template><div><h1>搜索电台</h1><p>搜索功能开发中...</p></div></template>
          <script setup lang="ts"></script>
          EOF
          
          cat > src/views/History.vue << 'EOF'
          <template><div><h1>播放历史</h1><p>历史记录功能开发中...</p></div></template>
          <script setup lang="ts"></script>
          EOF
          
          cat > src/views/Favorites.vue << 'EOF'
          <template><div><h1>我的收藏</h1><p>收藏功能开发中...</p></div></template>
          <script setup lang="ts"></script>
          EOF
          
          cat > src/views/Settings.vue << 'EOF'
          <template><div><h1>设置</h1><p>设置功能开发中...</p></div></template>
          <script setup lang="ts"></script>
          EOF
          
          cat > src/views/StationDetail.vue << 'EOF'
          <template><div><h1>电台详情</h1><p>电台详情功能开发中...</p></div></template>
          <script setup lang="ts"></script>
          EOF
          
          cat > src/style.css << 'EOF'
          * { margin: 0; padding: 0; box-sizing: border-box; }
          body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #f2f2f7; color: #1c1c1e; }
          #app { min-height: 100vh; }
          EOF
          
          cat > vite.config.ts << 'EOF'
          import { defineConfig } from 'vite'
          import vue from '@vitejs/plugin-vue'
          import { resolve } from 'path'
          export default defineConfig({
            plugins: [vue()],
            resolve: { alias: { '@': resolve(__dirname, 'src') } },
            build: { outDir: 'dist' },
          })
          EOF
          
          cat > tsconfig.json << 'EOF'
          {
            "compilerOptions": {
              "target": "ES2020",
              "module": "ESNext",
              "lib": ["ES2020", "DOM", "DOM.Iterable"],
              "skipLibCheck": true,
              "moduleResolution": "bundler",
              "allowImportingTsExtensions": true,
              "resolveJsonModule": true,
              "isolatedModules": true,
              "noEmit": true,
              "jsx": "preserve",
              "strict": true,
              "baseUrl": ".",
              "paths": { "@/*": ["src/*"] }
            },
            "include": ["src/**/*.ts", "src/**/*.d.ts", "src/**/*.tsx", "src/**/*.vue"],
            "references": [{ "path": "./tsconfig.node.json" }]
          }
          EOF
          
          cat > tsconfig.node.json << 'EOF'
          {
            "compilerOptions": {
              "composite": true,
              "skipLibCheck": true,
              "module": "ESNext",
              "moduleResolution": "bundler",
              "allowSyntheticDefaultImports": true
            },
            "include": ["vite.config.ts"]
          }
          EOF
          
          cat > src/vite-env.d.ts << 'EOF'
          /// <reference types="vite/client" />
          EOF
          
          echo '✅ 所有Vue项目文件创建完成'
      
      - name: 构建Vue
        run: npm run build
      
      - name: 同步Capacitor
        run: npx cap sync android
      
      - name: 构建APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
      
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/release/*.apk

  # 4. 创建GitHub Release
  create-release:
    needs: [build-web, build-electron, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: 创建Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: RELEASE_NOTES.md
          files: |
            artifacts/**/*.zip
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
