name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '自定义版本号 (留空则使用日期，如 v2026.07.24)'
        required: false
        default: ''
      create_release:
        description: '是否创建 GitHub Release'
        type: boolean
        required: false
        default: true
      build_docker:
        description: '是否构建 Docker 镜像'
        type: boolean
        required: false
        default: false

permissions:
  contents: write
  actions: read

env:
  NODE_VERSION: 20
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  # ============================================
  # Job 1: 验证项目结构
  # ============================================
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 验证项目结构
        run: |
          echo "检查关键文件..."
          test -f src/main.ts || (echo "src/main.ts 不存在" && exit 1)
          test -f index.html || (echo "index.html 不存在" && exit 1)
          echo "验证通过"

  # ============================================
  # Job 2: 构建 Web 产物
  # ============================================
  build-web:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: 安装依赖
        run: npm install --no-audit --no-fund
      - name: 构建 Web
        run: npm run build
      - name: 验证构建产物
        run: |
          ls -la dist/
          test -f dist/index.html || (echo "dist/index.html 不存在" && exit 1)
      - name: 打包 Web 产物
        run: |
          cd dist
          zip -r ../web-dist.zip .
          cd ..
          ls -la web-dist.zip
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web-dist.zip

  # ============================================
  # Job 3: 构建 Android APK
  # ============================================
  build-android:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 安装依赖
        run: npm install --no-audit --no-fund

      - name: 构建 Web
        run: npm run build

      - name: 验证 Web 构建产物
        run: |
          test -f dist/index.html || (echo "dist/index.html 不存在" && exit 1)

      - name: 初始化 Android 平台
        run: |
          rm -rf android
          npx cap add android
          npx cap sync android
          chmod +x android/gradlew

      - name: 验证 gradlew
        run: |
          ls -la android/gradlew
          test -f android/gradlew || (echo "gradlew 不存在" && exit 1)

      - name: 构建 Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: 构建 Release APK
        run: |
          cd android
          ./gradlew assembleRelease

      - name: 获取版本号
        id: get_version
        run: |
          VERSION="${{ github.event.inputs.tag }}"
          if [ -z "$VERSION" ]; then
            VERSION="v$(date +'%Y.%m.%d')"
          fi
          CLEAN_VERSION=$(echo "$VERSION" | sed 's/-[0-9]*$//')
          echo "VERSION=${CLEAN_VERSION}" >> $GITHUB_OUTPUT
          echo "版本号: ${CLEAN_VERSION}"

      - name: 收集 APK 产物
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          mkdir -p apk-outputs

          if [ -f "android/app/build/outputs/apk/debug/app-debug.apk" ]; then
            cp android/app/build/outputs/apk/debug/app-debug.apk "apk-outputs/global-radio-${VERSION}-debug.apk"
            echo "Debug APK: global-radio-${VERSION}-debug.apk"
          fi

          if [ -f "android/app/build/outputs/apk/release/app-release.apk" ]; then
            cp android/app/build/outputs/apk/release/app-release.apk "apk-outputs/global-radio-${VERSION}.apk"
            echo "Release APK: global-radio-${VERSION}.apk"
          elif [ -f "android/app/build/outputs/apk/release/app-release-unsigned.apk" ]; then
            cp android/app/build/outputs/apk/release/app-release-unsigned.apk "apk-outputs/global-radio-${VERSION}.apk"
            echo "未签名 APK: global-radio-${VERSION}.apk"
          fi

          echo "APK 产物列表："
          ls -la apk-outputs/

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: apk-outputs/*.apk

  # ============================================
  # Job 4: 构建 Windows EXE
  # ============================================
  build-windows:
    runs-on: windows-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装依赖
        run: npm install --no-audit --no-fund

      - name: 构建 Web
        run: npm run build

      - name: 验证构建产物
        run: |
          if (Test-Path dist/index.html) {
            Write-Host "dist/index.html 存在"
          } else {
            Write-Host "dist/index.html 不存在"
            exit 1
          }

      - name: 检查 Electron 配置
        run: |
          if (Test-Path electron/main.js) {
            Write-Host "electron/main.js 存在"
          } else {
            Write-Host "electron/main.js 不存在，跳过 Electron 构建"
            exit 0
          }

      - name: 获取版本号
        id: get_version
        run: |
          $VERSION = "${{ github.event.inputs.tag }}"
          if ([string]::IsNullOrEmpty($VERSION)) {
            $VERSION = "v$(Get-Date -Format 'yyyy.MM.dd')"
          }
          $CLEAN_VERSION = $VERSION -replace '-[0-9]*$', ''
          echo "VERSION=$CLEAN_VERSION" >> $env:GITHUB_OUTPUT

      - name: 构建 Windows EXE
        if: hashFiles('electron/main.js') != ''
        run: |
          npm run electron:build -- --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 收集 Windows 产物
        if: hashFiles('electron/main.js') != ''
        run: |
          $VERSION = "${{ steps.get_version.outputs.VERSION }}"
          New-Item -ItemType Directory -Force -Path exe-outputs

          Get-ChildItem -Path release/ -Recurse -Filter "*.exe" | ForEach-Object {
            if ($_.Length -gt 1MB) {
              $destName = "global-radio-${VERSION}-win-x64.exe"
              Copy-Item -Path $_.FullName -Destination "exe-outputs/$destName"
              Write-Host "EXE: $destName ($([math]::Round($_.Length/1MB, 2)) MB)"
            }
          }

      - uses: actions/upload-artifact@v4
        if: hashFiles('electron/main.js') != ''
        with:
          name: windows-exe
          path: exe-outputs/*.exe

  # ============================================
  # Job 5: 构建 Docker 镜像
  # ============================================
  build-docker:
    runs-on: ubuntu-latest
    needs: build-web
    if: github.event.inputs.build_docker == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: 下载 Web 产物
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: .
      - name: 解压 Web 产物
        run: |
          unzip web-dist.zip -d dist
          rm web-dist.zip
          ls -la dist/
      - name: 检查 Dockerfile
        run: test -f Dockerfile || (echo "Dockerfile 不存在" && exit 1)
      - name: 验证 Docker 用户名
        run: |
          if [ -z "${{ secrets.DOCKER_USERNAME }}" ]; then
            echo "错误: DOCKER_USERNAME 未设置"
            exit 1
          fi
          echo "Docker 用户名: ${{ secrets.DOCKER_USERNAME }}"
      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: 获取版本号
        id: get_version
        run: |
          VERSION="${{ github.event.inputs.tag }}"
          if [ -z "$VERSION" ]; then
            VERSION="v$(date +'%Y.%m.%d')"
          fi
          CLEAN_VERSION=$(echo "$VERSION" | sed 's/-[0-9]*$//')
          echo "VERSION=${CLEAN_VERSION}" >> $GITHUB_OUTPUT
      - name: 构建并推送 AMD64 镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/global-radio:latest
            ${{ secrets.DOCKER_USERNAME }}/global-radio:${{ steps.get_version.outputs.VERSION }}
      - name: 构建并推送 ARM64 镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/global-radio-arm64:latest
            ${{ secrets.DOCKER_USERNAME }}/global-radio-arm64:${{ steps.get_version.outputs.VERSION }}

  # ============================================
  # Job 6: 创建 GitHub Release
  # ============================================
  create-release:
    needs: [build-web, build-android, build-windows]
    runs-on: ubuntu-latest
    if: |
      github.event.inputs.create_release == 'true' ||
      startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      # ============================================
      # 获取版本号
      # ============================================
      - name: 获取版本号
        id: get_version
        run: |
          VERSION="${{ github.event.inputs.tag }}"
          if [ -z "$VERSION" ]; then
            VERSION="v$(date +'%Y.%m.%d')"
          fi
          CLEAN_VERSION=$(echo "$VERSION" | sed 's/-[0-9]*$//')
          echo "VERSION=${CLEAN_VERSION}" >> $GITHUB_OUTPUT
          echo "RELEASE_TAG=${CLEAN_VERSION}" >> $GITHUB_OUTPUT
          echo "版本号: ${CLEAN_VERSION}"

      # ============================================
      # 调试：显示所有 artifacts 内容
      # ============================================
      - name: 调试 - 显示 artifacts 目录
        run: |
          echo "📂 artifacts 目录结构："
          find artifacts/ -type f | head -100
          echo ""
          echo "📦 查找 APK 文件："
          find artifacts/ -name "*.apk" -exec ls -la {} \;
          echo ""
          echo "📦 查找 EXE 文件："
          find artifacts/ -name "*.exe" -exec ls -la {} \;
          echo ""
          echo "📦 查找 ZIP 文件："
          find artifacts/ -name "*.zip" -exec ls -la {} \;

      # ============================================
      # 删除已存在的 Release（避免冲突）
      # ============================================
      - name: 删除已存在的 Release
        run: |
          TAG="${{ steps.get_version.outputs.RELEASE_TAG }}"
          echo "检查 Release ${TAG} 是否已存在..."
          RESPONSE=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${TAG}")

          if echo "$RESPONSE" | grep -q '"id":'; then
            RELEASE_ID=$(echo "$RESPONSE" | grep -o '"id":[0-9]*' | head -1 | cut -d: -f2)
            echo "删除已存在的 Release: ${TAG} (ID: ${RELEASE_ID})"
            curl -X DELETE \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/releases/${RELEASE_ID}"
            echo "等待 5 秒确保删除完成..."
            sleep 5
          else
            echo "Release ${TAG} 不存在，可以直接创建"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ============================================
      # 整理产物（使用通配符复制所有文件）
      # ============================================
      - name: 整理产物
        id: prepare_assets
        run: |
          mkdir -p release-assets
          echo "复制所有 APK 文件..."
          find artifacts/ -name "*.apk" -exec cp {} release-assets/ \; -print
          echo "复制所有 EXE 文件..."
          find artifacts/ -name "*.exe" -exec cp {} release-assets/ \; -print
          echo "复制所有 ZIP 文件..."
          find artifacts/ -name "*.zip" -exec cp {} release-assets/ \; -print
          echo ""
          echo "release-assets 目录内容："
          ls -la release-assets/ || echo "没有产物文件"

      - name: 生成 Release Notes
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          DATE=$(date +'%Y年%m月%d日 %H:%M:%S')
          cat > RELEASE_NOTES.md << EOF
          # 全球电台 v${VERSION}

          ## 构建时间
          ${DATE}

          ## 下载说明

          ### Android
          - 下载 APK 文件安装到手机

          ### Windows
          - 下载 EXE 文件安装到电脑

          ### Web
          - 在线演示: https://aabb.live

          ### Docker
          - docker pull ${{ secrets.DOCKER_USERNAME }}/global-radio:${VERSION}

          感谢使用全球电台！
          EOF
          cat RELEASE_NOTES.md

      # ============================================
      # 创建 Release
      # ============================================
      - name: 创建 Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ steps.get_version.outputs.RELEASE_TAG }}
          release_name: 全球电台 v${{ steps.get_version.outputs.VERSION }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ============================================
      # 上传所有 APK
      # ============================================
      - name: 上传 APK
        if: hashFiles('release-assets/*.apk') != ''
        run: |
          UPLOAD_URL="${{ steps.create_release.outputs.upload_url }}"
          echo "上传 APK 文件到 Release..."
          for FILE in release-assets/*.apk; do
            if [ -f "$FILE" ]; then
              FILENAME=$(basename "$FILE")
              echo "📤 上传 $FILENAME..."
              curl -X POST \
                -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                -H "Content-Type: application/vnd.android.package-archive" \
                "${UPLOAD_URL}?name=${FILENAME}" \
                --data-binary "@$FILE"
            fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ============================================
      # 上传所有 EXE
      # ============================================
      - name: 上传 Windows EXE
        if: hashFiles('release-assets/*.exe') != ''
        run: |
          UPLOAD_URL="${{ steps.create_release.outputs.upload_url }}"
          echo "上传 EXE 文件到 Release..."
          for FILE in release-assets/*.exe; do
            if [ -f "$FILE" ]; then
              FILENAME=$(basename "$FILE")
              echo "📤 上传 $FILENAME..."
              curl -X POST \
                -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                -H "Content-Type: application/vnd.microsoft.portable-executable" \
                "${UPLOAD_URL}?name=${FILENAME}" \
                --data-binary "@$FILE"
            fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ============================================
      # 上传所有 ZIP
      # ============================================
      - name: 上传 Web 产物
        if: hashFiles('release-assets/*.zip') != ''
        run: |
          UPLOAD_URL="${{ steps.create_release.outputs.upload_url }}"
          echo "上传 ZIP 文件到 Release..."
          for FILE in release-assets/*.zip; do
            if [ -f "$FILE" ]; then
              FILENAME=$(basename "$FILE")
              # 跳过 Source code 文件
              if [[ "$FILENAME" != "Source"* ]]; then
                echo "📤 上传 $FILENAME..."
                curl -X POST \
                  -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                  -H "Content-Type: application/zip" \
                  "${UPLOAD_URL}?name=${FILENAME}" \
                  --data-binary "@$FILE"
              fi
            fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ============================================
      # 检查是否有产物
      # ============================================
      - name: 检查产物
        run: |
          echo "检查 release-assets 目录..."
          ls -la release-assets/ || echo "目录为空"
          if [ ! "$(ls -A release-assets/)" ]; then
            echo "⚠️ 警告：没有找到任何产物文件！"
            echo "请检查 build-android 和 build-windows Job 是否成功生成文件"
            exit 1
          else
            echo "✅ 找到了产物文件："
            ls -la release-assets/
          fi
