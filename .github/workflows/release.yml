name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '版本号 (如 v1.0.0)'
        required: true
        default: 'v1.0.0'
      create_release:
        description: '是否创建 GitHub Release'
        type: boolean
        required: false
        default: true
      build_docker:
        description: '是否构建 Docker 镜像'
        type: boolean
        required: false
        default: false

permissions:
  contents: write
  actions: read

env:
  NODE_VERSION: 20

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 验证项目结构
        run: |
          echo "检查关键文件..."
          test -f src/main.ts || (echo "src/main.ts 不存在" && exit 1)
          test -f index.html || (echo "index.html 不存在" && exit 1)
          echo "验证通过"

  build-web:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: 安装依赖
        run: npm install --no-audit --no-fund
      - name: 构建 Web
        run: npm run build
      - name: 验证构建产物
        run: |
          ls -la dist/
          test -f dist/index.html || (echo "dist/index.html 不存在" && exit 1)
      - name: 打包 Web 产物
        run: |
          cd dist
          zip -r ../web-dist.zip .
          cd ..
          ls -la web-dist.zip
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web-dist.zip

  build-android:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 安装依赖
        run: npm install --no-audit --no-fund

      - name: 构建 Web
        run: npm run build

      - name: 验证 Web 构建产物
        run: |
          ls -la dist/
          test -f dist/index.html || (echo "dist/index.html 不存在" && exit 1)

      - name: 添加 Android 平台
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          ls -la android/

      - name: 同步 Capacitor
        run: npx cap sync android

      - name: 验证 Capacitor 同步结果
        run: |
          echo "android/app/src/main/assets/ 目录内容："
          ls -la android/app/src/main/assets/ || echo "assets 目录不存在"
          test -f android/app/src/main/assets/index.html && echo "index.html 已复制" || echo "index.html 未复制"

      - name: 检查 gradlew
        run: |
          cd android
          chmod +x gradlew
          ls -la gradlew

      - name: 构建 Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: 构建 Release APK
        run: |
          cd android
          ./gradlew assembleRelease

      - name: 收集 APK 产物
        run: |
          VERSION="${{ github.event.inputs.tag }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(echo ${GITHUB_REF#refs/tags/})
          fi
          if [ -z "$VERSION" ]; then
            VERSION="dev"
          fi

          mkdir -p apk-outputs

          DEBUG_APK="android/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$DEBUG_APK" ]; then
            cp "$DEBUG_APK" "apk-outputs/global-radio-${VERSION}-debug.apk"
            echo "Debug APK: global-radio-${VERSION}-debug.apk"
          fi

          RELEASE_APK="android/app/build/outputs/apk/release/app-release.apk"
          if [ -f "$RELEASE_APK" ]; then
            cp "$RELEASE_APK" "apk-outputs/global-radio-${VERSION}.apk"
            echo "Release APK: global-radio-${VERSION}.apk"
          else
            UNSIGNED_APK="android/app/build/outputs/apk/release/app-release-unsigned.apk"
            if [ -f "$UNSIGNED_APK" ]; then
              cp "$UNSIGNED_APK" "apk-outputs/global-radio-${VERSION}.apk"
              echo "未签名 APK: global-radio-${VERSION}.apk"
            fi
          fi

          echo "APK 产物列表："
          ls -la apk-outputs/

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: apk-outputs/*.apk

  # ============================================
  # Docker 构建 - 简化条件，只要勾选就执行
  # ============================================
  build-docker:
    runs-on: ubuntu-latest
    needs: build-web
    if: github.event.inputs.build_docker == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: 下载 Web 产物
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: .
      - name: 解压 Web 产物
        run: |
          unzip web-dist.zip -d dist
          rm web-dist.zip
          ls -la dist/
      - name: 检查 Dockerfile
        run: test -f Dockerfile || (echo "Dockerfile 不存在" && exit 1)
      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: 获取版本号
        id: get_version
        run: |
          VERSION="${{ github.event.inputs.tag }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(echo ${GITHUB_REF#refs/tags/})
          fi
          if [ -z "$VERSION" ]; then
            VERSION="dev"
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
      - name: 构建并推送 AMD64 镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/global-radio:latest
            ${{ secrets.DOCKER_USERNAME }}/global-radio:${{ steps.get_version.outputs.VERSION }}
      - name: 构建并推送 ARM64 镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/global-radio-arm64:latest
            ${{ secrets.DOCKER_USERNAME }}/global-radio-arm64:${{ steps.get_version.outputs.VERSION }}

  create-release:
    needs: [build-web, build-android]
    runs-on: ubuntu-latest
    if: |
      github.event.inputs.create_release == 'true' ||
      startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: 获取版本号
        id: get_version
        run: |
          VERSION="${{ github.event.inputs.tag }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(echo ${GITHUB_REF#refs/tags/})
          fi
          if [ -z "$VERSION" ]; then
            VERSION="dev-$(date +'%Y%m%d%H%M%S')"
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "RELEASE_TAG=${VERSION}" >> $GITHUB_OUTPUT
          echo "版本号: ${VERSION}"

      - name: 删除已存在的 Release
        run: |
          TAG="${{ steps.get_version.outputs.RELEASE_TAG }}"
          echo "检查 Release ${TAG} 是否已存在..."
          RESPONSE=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${TAG}")
          
          if echo "$RESPONSE" | grep -q '"id":'; then
            RELEASE_ID=$(echo "$RESPONSE" | grep -o '"id":[0-9]*' | head -1 | cut -d: -f2)
            echo "删除已存在的 Release: ${TAG} (ID: ${RELEASE_ID})"
            curl -X DELETE \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/releases/${RELEASE_ID}"
            echo "等待 3 秒确保删除完成..."
            sleep 3
          else
            echo "Release ${TAG} 不存在，可以直接创建"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 整理产物
        id: prepare_assets
        run: |
          mkdir -p release-assets
          echo "查找所有 APK 文件..."
          find artifacts/ -type f -name "*.apk" -print

          SIGNED_APK=$(find artifacts/ -type f -name "app-release.apk" | head -n 1)
          if [ -n "$SIGNED_APK" ]; then
            echo "找到已签名 APK: $SIGNED_APK"
            cp "$SIGNED_APK" "release-assets/global-radio-${{ steps.get_version.outputs.VERSION }}.apk"
          else
            UNSIGNED_APK=$(find artifacts/ -type f -name "app-release-unsigned.apk" | head -n 1)
            if [ -n "$UNSIGNED_APK" ]; then
              echo "找到未签名 APK: $UNSIGNED_APK"
              cp "$UNSIGNED_APK" "release-assets/global-radio-${{ steps.get_version.outputs.VERSION }}.apk"
            else
              ANY_APK=$(find artifacts/ -type f -name "*.apk" | head -n 1)
              if [ -n "$ANY_APK" ]; then
                echo "找到备用 APK: $ANY_APK"
                cp "$ANY_APK" "release-assets/global-radio-${{ steps.get_version.outputs.VERSION }}.apk"
              else
                echo "没有找到任何 APK 文件！"
                echo "artifacts 目录结构："
                ls -laR artifacts/
                exit 1
              fi
            fi
          fi

          WEB_ZIP=$(find artifacts/ -type f -name "*.zip" | head -n 1)
          if [ -n "$WEB_ZIP" ]; then
            echo "找到 Web 产物: $WEB_ZIP"
            cp "$WEB_ZIP" "release-assets/"
          else
            echo "未找到 Web 产物"
          fi

          echo "release-assets 目录内容："
          ls -la release-assets/

          test -f "release-assets/global-radio-${{ steps.get_version.outputs.VERSION }}.apk" || (echo "目标 APK 不存在！" && exit 1)

      - name: 生成 Release Notes
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          cat > RELEASE_NOTES.md << EOF
          # 全球电台 v${VERSION}

          ## 下载说明

          ### Android
          - 下载 APK 文件安装到手机

          ### Web
          - 在线演示: https://aabb.live

          ### Docker
          - docker pull ${{ secrets.DOCKER_USERNAME }}/global-radio:${VERSION}
          - docker pull ${{ secrets.DOCKER_USERNAME }}/global-radio-arm64:${VERSION}

          感谢使用全球电台！
          EOF
          cat RELEASE_NOTES.md

      - name: 创建 Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ steps.get_version.outputs.RELEASE_TAG }}
          release_name: 全球电台 v${{ steps.get_version.outputs.VERSION }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传 APK
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: release-assets/global-radio-${{ steps.get_version.outputs.VERSION }}.apk
          asset_name: global-radio-${{ steps.get_version.outputs.VERSION }}.apk
          asset_content_type: application/vnd.android.package-archive
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传 Web 产物
        if: hashFiles('release-assets/web-dist.zip') != ''
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: release-assets/web-dist.zip
          asset_name: web-dist-${{ steps.get_version.outputs.VERSION }}.zip
          asset_content_type: application/zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
