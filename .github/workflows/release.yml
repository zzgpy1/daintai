name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # 1. 构建Web产物
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: 安装依赖
        shell: bash
        run: |
          npm install || npm install --legacy-peer-deps
          if ! command -v vite &> /dev/null && ! [ -f node_modules/.bin/vite ]; then
            npm install -D vite @vitejs/plugin-vue
          fi
      
      - name: 确保入口文件存在
        shell: bash
        run: |
          # 创建 index.html
          if [ ! -f "index.html" ]; then
            cat > index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="zh-CN">
            <head>
              <meta charset="UTF-8" />
              <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>全球电台 - GlobalRadio</title>
            </head>
            <body>
              <div id="app"></div>
              <script type="module" src="/src/main.ts"></script>
            </body>
          </html>
          EOF
            echo '✅ 已创建 index.html'
          fi
          
          # 创建 src/main.ts
          mkdir -p src
          if [ ! -f "src/main.ts" ]; then
            cat > src/main.ts << 'EOF'
          import { createApp } from 'vue'
          import { createPinia } from 'pinia'
          import App from './App.vue'
          import router from './router'
          import './style.css'
          
          const app = createApp(App)
          app.use(createPinia())
          app.use(router)
          app.mount('#app')
          EOF
            echo '✅ 已创建 src/main.ts'
          fi
          
          # 创建 src/App.vue
          if [ ! -f "src/App.vue" ]; then
            cat > src/App.vue << 'EOF'
          <template>
            <div id="app">
              <router-view />
            </div>
          </template>
          
          <script setup lang="ts">
          // App component
          </script>
          EOF
            echo '✅ 已创建 src/App.vue'
          fi
          
          # 创建 vite.config.ts
          if [ ! -f "vite.config.ts" ]; then
            cat > vite.config.ts << 'EOF'
          import { defineConfig } from 'vite'
          import vue from '@vitejs/plugin-vue'
          import { resolve } from 'path'
          
          export default defineConfig({
            plugins: [vue()],
            resolve: {
              alias: {
                '@': resolve(__dirname, 'src'),
              },
            },
            server: {
              host: '0.0.0.0',
              port: 4173,
            },
            build: {
              outDir: 'dist',
              assetsDir: 'assets',
              sourcemap: false,
            },
          })
          EOF
            echo '✅ 已创建 vite.config.ts'
          fi
          
          # 显示目录结构
          echo '📁 目录结构:'
          ls -la
          echo '📁 src 目录:'
          ls -la src/ || echo 'src 目录为空'
      
      - name: 构建Web
        run: npm run build
      
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/

  # 2. 构建Electron桌面端
  build-electron:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: 安装依赖并确保工具链完整
        shell: bash
        run: |
          set +e
          npm install || npm install --legacy-peer-deps
          
          if ! command -v vite &> /dev/null && ! [ -f node_modules/.bin/vite ]; then
            echo '⚠️  Vite 未找到，正在安装...'
            npm install -D vite @vitejs/plugin-vue
          fi
          
          if ! [ -f node_modules/.bin/electron-builder ]; then
            echo '⚠️  Electron 未找到，正在安装...'
            npm install -D electron electron-builder
          fi
          
          echo '🔍 验证工具:'
          npx vite --version 2>/dev/null || echo '❌ Vite 不可用'
      
      - name: 确保入口文件和配置存在
        shell: bash
        run: |
          # 创建 index.html
          if [ ! -f "index.html" ]; then
            cat > index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="zh-CN">
            <head>
              <meta charset="UTF-8" />
              <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>全球电台 - GlobalRadio</title>
            </head>
            <body>
              <div id="app"></div>
              <script type="module" src="/src/main.ts"></script>
            </body>
          </html>
          EOF
            echo '✅ 已创建 index.html'
          fi
          
          # 创建 src/main.ts
          mkdir -p src
          if [ ! -f "src/main.ts" ]; then
            cat > src/main.ts << 'EOF'
          import { createApp } from 'vue'
          import { createPinia } from 'pinia'
          import App from './App.vue'
          import router from './router'
          import './style.css'
          
          const app = createApp(App)
          app.use(createPinia())
          app.use(router)
          app.mount('#app')
          EOF
            echo '✅ 已创建 src/main.ts'
          fi
          
          # 创建 src/App.vue
          if [ ! -f "src/App.vue" ]; then
            cat > src/App.vue << 'EOF'
          <template>
            <div id="app">
              <router-view />
            </div>
          </template>
          
          <script setup lang="ts">
          </script>
          EOF
            echo '✅ 已创建 src/App.vue'
          fi
          
          # 创建 vite.config.ts
          if [ ! -f "vite.config.ts" ]; then
            cat > vite.config.ts << 'EOF'
          import { defineConfig } from 'vite'
          import vue from '@vitejs/plugin-vue'
          import { resolve } from 'path'
          
          export default defineConfig({
            plugins: [vue()],
            resolve: {
              alias: {
                '@': resolve(__dirname, 'src'),
              },
            },
            build: {
              outDir: 'dist',
            },
          })
          EOF
            echo '✅ 已创建 vite.config.ts'
          fi
      
      - name: 确保所有必要脚本存在
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            if (!pkg.scripts) pkg.scripts = {};
            if (!pkg.scripts.build) pkg.scripts.build = 'npx vite build';
            if (!pkg.scripts['electron:build']) pkg.scripts['electron:build'] = 'npm run build && npx electron-builder';
            if (!pkg.scripts['electron:dev']) pkg.scripts['electron:dev'] = 'npm run build && npx electron .';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
            console.log('✅ 已确保所有必要脚本存在');
          "
      
      - name: 创建Electron源文件（如缺失）
        shell: bash
        run: |
          mkdir -p electron
          if [ ! -f "electron/main.js" ]; then
            cat > electron/main.js << 'EOF'
          const { app, BrowserWindow, Menu, shell } = require('electron');
          const path = require('path');
          
          let mainWindow;
          
          function createWindow() {
            mainWindow = new BrowserWindow({
              width: 1200,
              height: 800,
              webPreferences: {
                preload: path.join(__dirname, 'preload.js'),
                nodeIntegration: false,
                contextIsolation: true,
              },
              icon: path.join(__dirname, '../public/favicon.ico'),
              show: false,
            });
          
            const isDev = !app.isPackaged;
            const startUrl = isDev
              ? 'http://localhost:4173'
              : `file://${path.join(__dirname, '../dist/index.html')}`;
          
            mainWindow.loadURL(startUrl);
            mainWindow.once('ready-to-show', () => mainWindow.show());
            mainWindow.webContents.setWindowOpenHandler(({ url }) => {
              shell.openExternal(url);
              return { action: 'deny' };
            });
            Menu.setApplicationMenu(null);
          }
          
          app.whenReady().then(createWindow);
          app.on('window-all-closed', () => { if (process.platform !== 'darwin') app.quit(); });
          app.on('activate', () => { if (BrowserWindow.getAllWindows().length === 0) createWindow(); });
          EOF
            echo '✅ 已创建 electron/main.js'
          fi
          
          if [ ! -f "electron/preload.js" ]; then
            cat > electron/preload.js << 'EOF'
          const { contextBridge } = require('electron');
          contextBridge.exposeInMainWorld('electronAPI', {
            platform: process.platform,
          });
          EOF
            echo '✅ 已创建 electron/preload.js'
          fi
      
      - name: 构建Electron应用
        run: npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - uses: actions/upload-artifact@v4
        with:
          name: electron-${{ matrix.os }}
          path: release/

  # 3. 构建Android APK
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: 安装依赖
        shell: bash
        run: |
          npm install || npm install --legacy-peer-deps
          if ! command -v vite &> /dev/null && ! [ -f node_modules/.bin/vite ]; then
            npm install -D vite @vitejs/plugin-vue
          fi
      
      - name: 确保入口文件存在
        shell: bash
        run: |
          if [ ! -f "index.html" ]; then
            cat > index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="zh-CN">
            <head>
              <meta charset="UTF-8" />
              <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>全球电台 - GlobalRadio</title>
            </head>
            <body>
              <div id="app"></div>
              <script type="module" src="/src/main.ts"></script>
            </body>
          </html>
          EOF
            echo '✅ 已创建 index.html'
          fi
      
      - name: 构建Vue
        run: npm run build
      
      - name: 同步Capacitor
        run: npx cap sync android
      
      - name: 构建APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
      
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/release/*.apk

  # 4. 创建GitHub Release
  create-release:
    needs: [build-web, build-electron, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: 创建Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: RELEASE_NOTES.md
          files: |
            artifacts/**/*.zip
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
