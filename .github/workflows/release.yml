name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # 1. 构建Web产物
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: 安装依赖
        run: npm install
      
      - name: 确保构建脚本存在
        run: |
          # 检查是否有 build 脚本，如果没有则添加
          if ! grep -q '"build"' package.json; then
            echo '⚠️  package.json 中缺少 build 脚本，正在添加...'
            # 使用临时文件添加 build 脚本
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
              if (!pkg.scripts) pkg.scripts = {};
              if (!pkg.scripts.build) {
                pkg.scripts.build = 'vite build';
                fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
                console.log('✅ 已添加 build: vite build 脚本');
              }
            "
          else
            echo '✅ build 脚本已存在'
          fi
          # 显示当前脚本列表便于调试
          echo '📋 当前脚本列表:'
          npm run
      
      - name: 构建Web
        run: npm run build
      
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/

  # 2. 构建Electron桌面端
  build-electron:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: 安装依赖
        run: npm install
      
      - name: 确保所有必要脚本存在
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            if (!pkg.scripts) pkg.scripts = {};
            
            // 确保 build 脚本存在
            if (!pkg.scripts.build) {
              pkg.scripts.build = 'vite build';
            }
            
            // 确保 electron:build 脚本存在
            if (!pkg.scripts['electron:build']) {
              pkg.scripts['electron:build'] = 'npm run build && electron-builder';
            }
            
            // 确保 electron:dev 脚本存在
            if (!pkg.scripts['electron:dev']) {
              pkg.scripts['electron:dev'] = 'npm run build && electron .';
            }
            
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
            console.log('✅ 已确保所有必要脚本存在');
          "
          echo '📋 当前脚本列表:'
          npm run
      
      - name: 构建Electron应用
        run: npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - uses: actions/upload-artifact@v4
        with:
          name: electron-${{ matrix.os }}
          path: release/

  # 3. 构建Android APK
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: 安装依赖
        run: npm install
      
      - name: 确保构建脚本存在
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            if (!pkg.scripts) pkg.scripts = {};
            if (!pkg.scripts.build) {
              pkg.scripts.build = 'vite build';
              fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
              console.log('✅ 已添加 build 脚本');
            }
          "
      
      - name: 构建Vue
        run: npm run build
      
      - name: 同步Capacitor
        run: npx cap sync android
      
      - name: 构建APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
      
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/release/*.apk

  # 4. 创建GitHub Release
  create-release:
    needs: [build-web, build-electron, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: 创建Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: RELEASE_NOTES.md
          files: |
            artifacts/**/*.zip
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
