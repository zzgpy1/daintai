name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# 设置环境变量以解决 Node 版本警告
env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  # 1. 构建 Web 产物
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20  # 使用 Node 20（通过环境变量允许）
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
      - name: 验证 lockfile
        run: |
          if [ ! -f package-lock.json ]; then
            echo "❌ package-lock.json 不存在，正在生成..."
            npm install --package-lock-only
          fi
          ls -la package-lock.json
      - run: npm ci
      - run: npm run build
      - name: 验证构建产物
        run: |
          ls -la dist/
          test -f dist/index.html || (echo "❌ index.html 不存在" && exit 1)
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/

  # 2. 构建 Electron 桌面端
  build-electron:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
      - name: 验证 lockfile
        run: |
          if [ ! -f package-lock.json ]; then
            npm install --package-lock-only
          fi
      - run: npm ci
      - name: 验证 Electron 入口文件
        run: |
          test -f electron/main.js || (echo "❌ electron/main.js 不存在" && exit 1)
          test -f electron/preload.js || (echo "❌ electron/preload.js 不存在" && exit 1)
      - run: npm run build
      - name: 构建 Electron 应用
        run: npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: electron-${{ matrix.os }}
          path: release/

  # 3. 构建 Android APK (修正)
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
      - name: 验证 lockfile
        run: |
          if [ ! -f package-lock.json ]; then
            npm install --package-lock-only
          fi
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - run: npm ci
      - run: npm run build
      - name: 初始化 Capacitor
        run: |
          if [ ! -d "android" ]; then
            echo "📱 Android 目录不存在，正在初始化..."
            npx cap add android
          fi
      - name: 同步 Capacitor
        run: npx cap sync android
      - name: 验证 Android 项目
        run: |
          cd android
          if [ ! -f "gradlew" ]; then
            echo "❌ gradlew 不存在，正在修复..."
            cd ..
            npx cap sync android
            cd android
          fi
          chmod +x gradlew
          ls -la gradlew
      - name: 构建 APK
        run: |
          cd android
          ./gradlew assembleRelease
      - name: 验证 APK
        run: |
          APK_PATH="android/app/build/outputs/apk/release"
          ls -la $APK_PATH || (echo "❌ APK 目录不存在" && exit 1)
          find $APK_PATH -name "*.apk" | grep . || (echo "❌ 未找到 APK 文件" && exit 1)
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/release/*.apk

  # 4. 创建 GitHub Release
  create-release:
    needs: [build-web, build-electron, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: 生成 Release Notes
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          cat > RELEASE_NOTES.md << 'EOF'
          # 全球电台 v${VERSION}

          ## 📦 下载说明
          请根据您的操作系统选择对应的安装包：

          ### 🖥️ Windows
          - \`global-radio-${VERSION}-win-setup.exe\` - 安装版
          - \`global-radio-${VERSION}-win-portable.exe\` - 便携版

          ### 🍎 macOS
          - \`global-radio-${VERSION}-mac.dmg\` - DMG 安装包
          - \`global-radio-${VERSION}-mac.zip\` - ZIP 压缩包

          ### 🐧 Linux
          - \`global-radio-${VERSION}-linux.AppImage\` - AppImage
          - \`global-radio-${VERSION}-linux.deb\` - DEB 安装包

          ### 📱 Android
          - \`app-release-${VERSION}.apk\` - APK 安装包

          ### 🌐 Web
          - Web 版本已部署到演示站点

          ---
          感谢使用全球电台！如有问题请反馈至 [Issues](https://github.com/moli-xia/global-radio/issues)
          EOF
          cat RELEASE_NOTES.md
      - name: 创建 Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.zip
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.apk
            artifacts/**/*.snap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
