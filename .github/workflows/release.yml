name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '自定义版本号 (留空则自动生成)'
        required: false
        default: ''
      create_release:
        description: '是否创建 GitHub Release'
        type: boolean
        required: false
        default: true
      build_docker:
        description: '是否构建 Docker 镜像'
        type: boolean
        required: false
        default: false

permissions:
  contents: write
  actions: read

env:
  NODE_VERSION: 20
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 验证项目结构
        run: |
          echo "检查关键文件..."
          test -f src/main.ts || (echo "src/main.ts 不存在" && exit 1)
          test -f index.html || (echo "index.html 不存在" && exit 1)
          echo "验证通过"

  # ============================================
  # 构建 Web 产物
  # ============================================
  build-web:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: 安装依赖
        run: npm install --no-audit --no-fund
      - name: 构建 Web
        run: npm run build
      - name: 验证构建产物
        run: |
          ls -la dist/
          test -f dist/index.html || (echo "dist/index.html 不存在" && exit 1)
      - name: 打包 Web 产物
        run: |
          cd dist
          zip -r ../web-dist.zip .
          cd ..
          ls -la web-dist.zip
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web-dist.zip

  # ============================================
  # 构建 Android APK（完整初始化 + 自动签名）
  # ============================================
  build-android:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 安装依赖
        run: npm install --no-audit --no-fund

      - name: 构建 Web
        run: npm run build

      - name: 验证 Web 构建产物
        run: |
          ls -la dist/
          test -f dist/index.html || (echo "dist/index.html 不存在" && exit 1)

      # ============================================
      # 初始化 Capacitor Android 平台
      # ============================================
      - name: 初始化 Capacitor Android 平台
        run: |
          # 检查 capacitor.config 是否存在
          if [ ! -f "capacitor.config.ts" ] && [ ! -f "capacitor.config.js" ]; then
            echo "⚠️ capacitor.config 不存在，创建默认配置"
            cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.globalradio.app",
            "appName": "全球电台",
            "webDir": "dist"
          }
          EOF
          fi
          
          # 如果 android 目录不存在，添加平台
          if [ ! -d "android" ]; then
            echo "📱 添加 Android 平台..."
            npx cap add android
          else
            echo "✅ Android 平台已存在"
          fi
          
          # 同步 Capacitor
          echo "🔄 同步 Capacitor..."
          npx cap sync android
          
          # 验证目录结构
          echo "📂 android 目录内容："
          ls -la android/
          echo ""
          echo "📂 android/app 目录内容："
          ls -la android/app/ || echo "app 目录不存在"

      - name: 检查 gradlew
        run: |
          cd android
          if [ -f "gradlew" ]; then
            chmod +x gradlew
            echo "✅ gradlew 存在且可执行"
          else
            echo "❌ gradlew 不存在，重新同步..."
            cd ..
            npx cap sync android
            cd android
            if [ -f "gradlew" ]; then
              chmod +x gradlew
              echo "✅ gradlew 已恢复"
            else
              echo "❌ gradlew 仍然不存在，强制添加平台..."
              cd ..
              rm -rf android
              npx cap add android
              cd android
              chmod +x gradlew
            fi
          fi
          ls -la gradlew

      # ============================================
      # 自动生成密钥库
      # ============================================
      - name: 生成密钥库
        id: generate_keystore
        run: |
          cd android
          
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "✅ 使用 Secrets 中的密钥库"
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks
          else
            echo "⚠️ 未找到密钥库 Secrets，自动生成临时密钥..."
            keytool -genkey -v \
              -keystore keystore.jks \
              -alias globalradio \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass 123456 \
              -keypass 123456 \
              -dname "CN=GlobalRadio, OU=GlobalRadio, O=GlobalRadio, L=Beijing, ST=Beijing, C=CN"
            echo "✅ 临时密钥库已生成"
          fi
          
          ls -la keystore.jks

      # ============================================
      # 构建 APK
      # ============================================
      - name: 构建 Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: 构建 Release APK（已签名）
        run: |
          cd android
          if [ -f "keystore.jks" ]; then
            echo "✅ 使用密钥构建 Release APK"
            ./gradlew assembleRelease
          else
            echo "⚠️ 密钥库不存在，跳过 Release 构建"
            exit 0
          fi
        env:
          KEYSTORE_FILE: keystore.jks
          KEYSTORE_PASSWORD: 123456
          KEY_ALIAS: globalradio
          KEY_PASSWORD: 123456

      - name: 验证构建产物
        run: |
          echo "📂 Debug APK 目录："
          ls -la android/app/build/outputs/apk/debug/ || echo "Debug 目录不存在"
          echo ""
          echo "📂 Release APK 目录："
          ls -la android/app/build/outputs/apk/release/ || echo "Release 目录不存在"

      - name: 收集 APK 产物
        id: collect_apk
        run: |
          VERSION="${{ github.event.inputs.tag }}"
          if [ -z "$VERSION" ]; then
            VERSION="v$(date +'%Y.%m.%d-%H%M%S')"
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT

          mkdir -p apk-outputs

          DEBUG_APK="android/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$DEBUG_APK" ]; then
            cp "$DEBUG_APK" "apk-outputs/global-radio-${VERSION}-debug.apk"
            echo "✅ Debug APK: global-radio-${VERSION}-debug.apk"
          fi

          RELEASE_APK="android/app/build/outputs/apk/release/app-release.apk"
          if [ -f "$RELEASE_APK" ]; then
            if unzip -l "$RELEASE_APK" | grep -q "META-INF"; then
              echo "✅ Release APK 已签名"
              cp "$RELEASE_APK" "apk-outputs/global-radio-${VERSION}.apk"
              echo "✅ Release APK: global-radio-${VERSION}.apk"
            else
              echo "⚠️ Release APK 未签名"
              if [ -f "$DEBUG_APK" ]; then
                cp "$DEBUG_APK" "apk-outputs/global-radio-${VERSION}.apk"
                echo "✅ 使用 Debug APK 替代: global-radio-${VERSION}.apk"
              fi
            fi
          else
            if [ -f "$DEBUG_APK" ]; then
              cp "$DEBUG_APK" "apk-outputs/global-radio-${VERSION}.apk"
              echo "✅ 使用 Debug APK: global-radio-${VERSION}.apk"
            else
              echo "❌ 没有找到任何 APK 文件"
              exit 1
            fi
          fi

          echo "📦 APK 产物列表："
          ls -la apk-outputs/

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: apk-outputs/*.apk

  # ============================================
  # 构建 Windows EXE
  # ============================================
  build-windows:
    runs-on: windows-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装依赖
        run: npm install --no-audit --no-fund

      - name: 构建 Web
        run: npm run build

      - name: 验证构建产物
        run: |
          if (Test-Path dist/index.html) {
            Write-Host "✅ dist/index.html 存在"
          } else {
            Write-Host "❌ dist/index.html 不存在"
            exit 1
          }

      - name: 检查 Electron 配置
        run: |
          if (Test-Path electron/main.js) {
            Write-Host "✅ electron/main.js 存在"
          } else {
            Write-Host "⚠️ electron/main.js 不存在，跳过"
            exit 0
          }

      - name: 获取版本号
        id: get_version
        run: |
          if ([string]::IsNullOrEmpty("${{ github.event.inputs.tag }}")) {
            $VERSION = "v$(Get-Date -Format 'yyyy.MM.dd-HHmmss')"
          } else {
            $VERSION = "${{ github.event.inputs.tag }}"
          }
          Write-Host "VERSION=$VERSION"
          echo "VERSION=$VERSION" >> $env:GITHUB_OUTPUT

      - name: 构建 Windows EXE
        if: hashFiles('electron/main.js') != ''
        run: |
          npm run electron:build -- --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 收集 Windows 产物
        if: hashFiles('electron/main.js') != ''
        run: |
          $VERSION = "${{ steps.get_version.outputs.VERSION }}"
          New-Item -ItemType Directory -Force -Path exe-outputs
          
          Get-ChildItem -Path release/ -Recurse -Filter "*.exe" | ForEach-Object {
            if ($_.Length -gt 1MB) {
              $destName = "global-radio-${VERSION}-win-x64.exe"
              Copy-Item -Path $_.FullName -Destination "exe-outputs/$destName"
              Write-Host "✅ EXE: $destName"
            }
          }

      - uses: actions/upload-artifact@v4
        if: hashFiles('electron/main.js') != ''
        with:
          name: windows-exe
          path: exe-outputs/*.exe

  # ============================================
  # 构建 Docker 镜像
  # ============================================
  build-docker:
    runs-on: ubuntu-latest
    needs: build-web
    if: github.event.inputs.build_docker == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: 下载 Web 产物
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: .
      - name: 解压 Web 产物
        run: |
          unzip web-dist.zip -d dist
          rm web-dist.zip
          ls -la dist/
      - name: 检查 Dockerfile
        run: test -f Dockerfile || (echo "Dockerfile 不存在" && exit 1)
      - name: 验证 Docker 用户名
        run: |
          if [ -z "${{ secrets.DOCKER_USERNAME }}" ]; then
            echo "错误: DOCKER_USERNAME 未设置"
            exit 1
          fi
          echo "Docker 用户名: ${{ secrets.DOCKER_USERNAME }}"
      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: 获取版本号
        id: get_version
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          else
            VERSION="v$(date +'%Y.%m.%d-%H%M%S')"
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
      - name: 构建并推送 AMD64 镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/global-radio:latest
            ${{ secrets.DOCKER_USERNAME }}/global-radio:${{ steps.get_version.outputs.VERSION }}
      - name: 构建并推送 ARM64 镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/global-radio-arm64:latest
            ${{ secrets.DOCKER_USERNAME }}/global-radio-arm64:${{ steps.get_version.outputs.VERSION }}

  # ============================================
  # 创建 GitHub Release
  # ============================================
  create-release:
    needs: [build-web, build-android, build-windows]
    runs-on: ubuntu-latest
    if: |
      github.event.inputs.create_release == 'true' ||
      startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: 获取版本号
        id: get_version
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          else
            VERSION="v$(date +'%Y.%m.%d-%H%M%S')"
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "RELEASE_TAG=${VERSION}" >> $GITHUB_OUTPUT
          echo "版本号: ${VERSION}"

      - name: 删除已存在的 Release
        run: |
          TAG="${{ steps.get_version.outputs.RELEASE_TAG }}"
          echo "检查 Release ${TAG} 是否已存在..."
          RESPONSE=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${TAG}")
          
          if echo "$RESPONSE" | grep -q '"id":'; then
            RELEASE_ID=$(echo "$RESPONSE" | grep -o '"id":[0-9]*' | head -1 | cut -d: -f2)
            echo "删除已存在的 Release: ${TAG} (ID: ${RELEASE_ID})"
            curl -X DELETE \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/releases/${RELEASE_ID}"
            echo "等待 3 秒确保删除完成..."
            sleep 3
          else
            echo "Release ${TAG} 不存在"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 整理产物
        id: prepare_assets
        run: |
          mkdir -p release-assets
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          
          echo "📂 查找所有产物..."
          find artifacts/ -type f -print
          
          APK_FILE=$(find artifacts/ -type f -name "*.apk" ! -name "*-debug.apk" ! -name "*-unsigned.apk" | head -1)
          if [ -z "$APK_FILE" ]; then
            APK_FILE=$(find artifacts/ -type f -name "*.apk" | head -1)
          fi
          if [ -n "$APK_FILE" ]; then
            cp "$APK_FILE" "release-assets/global-radio-${VERSION}.apk"
            echo "✅ APK: $APK_FILE -> global-radio-${VERSION}.apk"
          else
            echo "❌ 未找到 APK 文件"
            exit 1
          fi
          
          DEBUG_APK=$(find artifacts/ -type f -name "*-debug.apk" | head -1)
          if [ -n "$DEBUG_APK" ]; then
            cp "$DEBUG_APK" "release-assets/global-radio-${VERSION}-debug.apk"
            echo "✅ Debug APK: $DEBUG_APK -> global-radio-${VERSION}-debug.apk"
          fi
          
          EXE_FILE=$(find artifacts/ -type f -name "*.exe" | head -1)
          if [ -n "$EXE_FILE" ]; then
            cp "$EXE_FILE" "release-assets/global-radio-${VERSION}.exe"
            echo "✅ EXE: $EXE_FILE -> global-radio-${VERSION}.exe"
          else
            echo "⚠️ 未找到 EXE 文件"
          fi
          
          ZIP_FILE=$(find artifacts/ -type f -name "*.zip" | head -1)
          if [ -n "$ZIP_FILE" ]; then
            cp "$ZIP_FILE" "release-assets/web-dist-${VERSION}.zip"
            echo "✅ ZIP: $ZIP_FILE -> web-dist-${VERSION}.zip"
          else
            echo "⚠️ 未找到 ZIP 文件"
          fi
          
          echo "📦 release-assets 目录内容："
          ls -la release-assets/

      - name: 生成 Release Notes
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          DATE=$(date +'%Y年%m月%d日 %H:%M:%S')
          cat > RELEASE_NOTES.md << EOF
          # 全球电台 v${VERSION}

          ## 📅 构建时间
          ${DATE}

          ## 📦 下载说明

          ### 📱 Android
          - 下载 APK 文件安装到手机（已签名，可正常安装）

          ### 💻 Windows
          - 下载 EXE 文件安装到电脑

          ### 🌐 Web
          - 在线演示: https://aabb.live

          ### 🐳 Docker
          - docker pull ${{ secrets.DOCKER_USERNAME }}/global-radio:${VERSION}

          感谢使用全球电台！
          EOF
          cat RELEASE_NOTES.md

      - name: 创建 Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ steps.get_version.outputs.RELEASE_TAG }}
          release_name: 全球电台 v${{ steps.get_version.outputs.VERSION }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传 APK
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: release-assets/global-radio-${{ steps.get_version.outputs.VERSION }}.apk
          asset_name: global-radio-${{ steps.get_version.outputs.VERSION }}.apk
          asset_content_type: application/vnd.android.package-archive
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传 Debug APK
        if: hashFiles('release-assets/global-radio-${{ steps.get_version.outputs.VERSION }}-debug.apk') != ''
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: release-assets/global-radio-${{ steps.get_version.outputs.VERSION }}-debug.apk
          asset_name: global-radio-${{ steps.get_version.outputs.VERSION }}-debug.apk
          asset_content_type: application/vnd.android.package-archive
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传 Windows EXE
        if: hashFiles('release-assets/global-radio-${{ steps.get_version.outputs.VERSION }}.exe') != ''
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: release-assets/global-radio-${{ steps.get_version.outputs.VERSION }}.exe
          asset_name: global-radio-${{ steps.get_version.outputs.VERSION }}.exe
          asset_content_type: application/vnd.microsoft.portable-executable
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传 Web 产物
        if: hashFiles('release-assets/web-dist-${{ steps.get_version.outputs.VERSION }}.zip') != ''
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: release-assets/web-dist-${{ steps.get_version.outputs.VERSION }}.zip
          asset_name: web-dist-${{ steps.get_version.outputs.VERSION }}.zip
          asset_content_type: application/zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
