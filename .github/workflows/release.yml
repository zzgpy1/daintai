name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '手动指定标签 (如 v1.0.0)'
        required: false
        default: ''

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  NODE_VERSION: 20

jobs:
  # 1. 版本管理
  version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: 更新版本号（仅当有 version-manager.js）
        run: |
          if [ -f "scripts/version-manager.js" ]; then
            node scripts/version-manager.js
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add package.json public/build.json
            git commit -m "chore: bump version" || echo "无变更"
            git push
          else
            echo "⚠️ 版本管理脚本不存在，跳过"
          fi

  # 2. 验证项目结构
  validate:
    runs-on: ubuntu-latest
    needs: version
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: 验证项目结构
        run: |
          echo "📂 检查关键文件..."
          test -f src/main.ts || (echo "❌ src/main.ts 不存在" && exit 1)
          test -f index.html || (echo "❌ index.html 不存在" && exit 1)
          test -f electron/main.js || (echo "⚠️ electron/main.js 不存在")
          echo "✅ 验证通过"

  # 3. 构建 Web 产物
  build-web:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: 安装依赖
        run: npm install --no-audit --no-fund
      - name: 构建 Web
        run: npm run build
      - name: 验证构建产物
        run: test -f dist/index.html || (echo "❌ dist/index.html 不存在" && exit 1)
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/

  # 4. 构建 Electron 桌面端 (Windows)
  build-electron-win:
    runs-on: windows-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: 安装依赖
        run: npm install --no-audit --no-fund
      - name: 构建 Vue
        run: npm run build
      - name: 构建 Electron (Windows)
        run: npm run electron:build -- --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: electron-win
          path: release/

  # 5. 构建 Electron 桌面端 (Linux)
  build-electron-linux:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: 安装依赖
        run: npm install --no-audit --no-fund
      - name: 构建 Vue
        run: npm run build
      - name: 构建 Electron (Linux)
        run: npm run electron:build -- --linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: electron-linux
          path: release/

  # 6. 构建 Electron 桌面端 (macOS)
  build-electron-mac:
    runs-on: macos-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: 安装依赖
        run: npm install --no-audit --no-fund
      - name: 构建 Vue
        run: npm run build
      - name: 构建 Electron (macOS)
        run: npm run electron:build -- --mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: electron-mac
          path: release/

  # 7. 构建 Android APK
  build-android:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: 安装依赖
        run: npm install --no-audit --no-fund
      - name: 构建 Vue
        run: npm run build
      - name: 初始化 Capacitor
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
      - name: 同步 Capacitor
        run: npx cap sync android
      - name: 构建 APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/release/*.apk

  # 8. 创建 GitHub Release
  create-release:
    needs: [build-web, build-electron-win, build-electron-linux, build-electron-mac, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - name: 整理产物
        run: |
          mkdir -p release-assets
          find artifacts/ -type f -exec cp {} release-assets/ \;
          echo "📦 产物列表："
          ls -la release-assets/ || echo "⚠️ 没有产物文件"
      - name: 获取版本号
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: 生成 Release Notes
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          cat > RELEASE_NOTES.md << 'EOF'
          # 全球电台 v${VERSION}

          ## 📦 下载说明

          ### 🖥️ Windows
          - `全球电台 Setup ${VERSION}.exe` - 安装版
          - `全球电台 ${VERSION}.exe` - 便携版

          ### 🐧 Linux
          - `全球电台-${VERSION}.AppImage` - AppImage
          - `全球电台_${VERSION}_amd64.deb` - DEB 安装包

          ### 🍎 macOS
          - `全球电台-${VERSION}.dmg` - DMG 安装包
          - `全球电台-${VERSION}.zip` - ZIP 压缩包

          ### 📱 Android
          - `app-release-${VERSION}.apk` - APK 安装包

          ### 🌐 Web
          - 在线演示: https://aabb.live

          ---
          感谢使用全球电台！
          EOF
          sed -i "s/\${VERSION}/${VERSION}/g" RELEASE_NOTES.md
          cat RELEASE_NOTES.md
      - name: 创建 Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
          files: |
            release-assets/*.zip
            release-assets/*.exe
            release-assets/*.dmg
            release-assets/*.AppImage
            release-assets/*.deb
            release-assets/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
