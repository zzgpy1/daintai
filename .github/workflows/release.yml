name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  # 1. 验证项目结构
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 验证项目结构
        shell: bash
        run: |
          echo "📂 当前目录内容:"
          ls -la
          echo ""
          echo "📂 src 目录内容:"
          ls -la src/ || echo "❌ src 目录不存在"
          echo ""
          echo "📄 检查 main.ts:"
          test -f src/main.ts && echo "✅ src/main.ts 存在" || echo "❌ src/main.ts 不存在"
          test -f index.html && echo "✅ index.html 存在" || echo "❌ index.html 不存在"

  # 2. 构建 Web 产物
  build-web:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: 验证项目文件
        shell: bash
        run: |
          if [ ! -f src/main.ts ]; then
            echo "❌ src/main.ts 不存在！正在检查..."
            find . -name "main.ts" 2>/dev/null || echo "未找到 main.ts"
            ls -la src/ || echo "src 目录不存在"
            exit 1
          fi
          if [ ! -f index.html ]; then
            echo "❌ index.html 不存在！"
            ls -la
            exit 1
          fi
          echo "✅ 所有必要文件存在"
      
      - name: 安装依赖
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci --no-audit --no-fund
          else
            npm install --no-audit --no-fund
          fi
      
      - name: 构建项目
        shell: bash
        run: npm run build
      
      - name: 验证构建产物
        shell: bash
        run: |
          ls -la dist/
          test -f dist/index.html || (echo "❌ dist/index.html 不存在" && exit 1)
      
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/

  # 3. 构建 Electron 桌面端
  build-electron:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    needs: validate
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: 验证项目文件
        shell: bash
        run: |
          test -f src/main.ts || (echo "❌ src/main.ts 不存在" && exit 1)
          test -f index.html || (echo "❌ index.html 不存在" && exit 1)
          test -f electron/main.js || (echo "❌ electron/main.js 不存在" && exit 1)
          test -f electron/preload.js || (echo "❌ electron/preload.js 不存在" && exit 1)
          echo "✅ 所有必要文件存在"
      
      - name: 安装依赖
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci --no-audit --no-fund
          else
            npm install --no-audit --no-fund
          fi
      
      - name: 构建 Vue 项目
        shell: bash
        run: npm run build
      
      - name: 验证构建产物
        shell: bash
        run: |
          test -f dist/index.html || (echo "❌ dist/index.html 不存在" && exit 1)
      
      - name: 构建 Electron 应用
        shell: bash
        run: npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - uses: actions/upload-artifact@v4
        with:
          name: electron-${{ matrix.os }}
          path: release/

  # 4. 构建 Android APK
  build-android:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: 验证项目文件
        shell: bash
        run: |
          test -f src/main.ts || (echo "❌ src/main.ts 不存在" && exit 1)
          test -f index.html || (echo "❌ index.html 不存在" && exit 1)
          echo "✅ 所有必要文件存在"
      
      - name: 安装依赖
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci --no-audit --no-fund
          else
            npm install --no-audit --no-fund
          fi
      
      - name: 构建 Vue 项目
        shell: bash
        run: npm run build
      
      - name: 验证构建产物
        shell: bash
        run: |
          test -f dist/index.html || (echo "❌ dist/index.html 不存在" && exit 1)
      
      - name: 初始化 Capacitor
        shell: bash
        run: |
          if [ ! -d "android" ]; then
            echo "📱 Android 目录不存在，正在初始化..."
            npx cap add android
          fi
      
      - name: 同步 Capacitor
        shell: bash
        run: npx cap sync android
      
      - name: 验证 Android 项目
        shell: bash
        run: |
          cd android
          if [ ! -f "gradlew" ]; then
            echo "❌ gradlew 不存在，正在修复..."
            cd ..
            npx cap sync android
            cd android
          fi
          chmod +x gradlew
          ls -la gradlew
      
      - name: 构建 APK
        shell: bash
        run: |
          cd android
          ./gradlew assembleRelease
      
      - name: 验证 APK
        shell: bash
        run: |
          APK_PATH="android/app/build/outputs/apk/release"
          ls -la $APK_PATH || (echo "❌ APK 目录不存在" && exit 1)
          find $APK_PATH -name "*.apk" | grep . || (echo "❌ 未找到 APK 文件" && exit 1)
      
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/release/*.apk

  # 5. 创建 GitHub Release
  create-release:
    needs: [build-web, build-electron, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: 生成 Release Notes
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          cat > RELEASE_NOTES.md << 'EOF'
          # 全球电台 v${VERSION}

          ## 📦 下载说明
          请根据您的操作系统选择对应的安装包：

          ### 🖥️ Windows
          - `global-radio-${VERSION}-win-setup.exe` - 安装版
          - `global-radio-${VERSION}-win-portable.exe` - 便携版

          ### 🍎 macOS
          - `global-radio-${VERSION}-mac.dmg` - DMG 安装包
          - `global-radio-${VERSION}-mac.zip` - ZIP 压缩包

          ### 🐧 Linux
          - `global-radio-${VERSION}-linux.AppImage` - AppImage
          - `global-radio-${VERSION}-linux.deb` - DEB 安装包

          ### 📱 Android
          - `app-release-${VERSION}.apk` - APK 安装包

          ### 🌐 Web
          - Web 版本已部署到演示站点

          ---
          感谢使用全球电台！如有问题请反馈至 [Issues](https://github.com/moli-xia/global-radio/issues)
          EOF
          # 替换版本号变量
          sed -i "s/\${VERSION}/${VERSION}/g" RELEASE_NOTES.md
          cat RELEASE_NOTES.md
      
      - name: 创建 Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.zip
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
