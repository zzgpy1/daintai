name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 v1.0.0)'
        required: true
        type: string

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  NODE_VERSION: 20

permissions:
  contents: write
  packages: write

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: 获取版本号
        id: get-version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
      - name: 验证项目结构
        run: |
          chmod +x scripts/verify-project.sh
          ./scripts/verify-project.sh

  build-web:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          # 移除 cache 配置，由后续脚本处理
      - name: 确保锁文件存在
        run: |
          if [ ! -f package-lock.json ]; then
            echo "⚠️  package-lock.json 不存在，正在生成..."
            npm install --package-lock-only
          fi
          echo "✅ 锁文件已就绪"
      - name: 安装依赖
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund
      - name: 构建
        run: npm run build
      - name: 验证构建产物
        run: |
          test -f dist/index.html || (echo "❌ 构建失败" && exit 1)
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/

  build-electron:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: 确保锁文件存在
        run: |
          if [ ! -f package-lock.json ]; then
            npm install --package-lock-only
          fi
      - name: 安装依赖
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund
      - name: 构建 Vue
        run: npm run build
      - name: 构建 Electron
        run: npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: electron-${{ matrix.os }}
          path: release/

  build-android:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: 确保锁文件存在
        run: |
          if [ ! -f package-lock.json ]; then
            npm install --package-lock-only
          fi
      - name: 安装依赖
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund
      - name: 构建 Vue
        run: npm run build
      - name: 初始化 Capacitor
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
      - name: 同步 Capacitor
        run: npx cap sync android
      - name: 构建 APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/release/*.apk

  create-release:
    needs: [build-web, build-electron, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: 生成 Release Notes
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          cat > RELEASE_NOTES.md << EOF
          # 🌍 全球电台 v${VERSION}

          ## 📦 下载说明
          - Windows: \`global-radio-${VERSION}-win-setup.exe\`
          - macOS: \`global-radio-${VERSION}-mac.dmg\`
          - Linux: \`global-radio-${VERSION}-linux.AppImage\`
          - Android: \`app-release-${VERSION}.apk\`

          EOF
      - name: 创建 Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: RELEASE_NOTES.md
          files: |
            artifacts/**/*.zip
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
