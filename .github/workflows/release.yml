name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # 1. 构建Web产物
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: 安装依赖
        shell: bash
        run: |
          npm install || npm install --legacy-peer-deps
          if ! command -v vite &> /dev/null && ! [ -f node_modules/.bin/vite ]; then
            npm install -D vite @vitejs/plugin-vue
          fi
      
      - name: 构建Web
        run: npm run build
      
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/

  # 2. 构建Electron桌面端（使用 Bash 确保跨平台兼容）
  build-electron:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: 安装依赖并确保工具链完整
        shell: bash
        run: |
          # Windows 下可能需要关闭 strict 模式
          set +e
          
          # 安装所有依赖
          npm install || npm install --legacy-peer-deps
          
          # 确保 Vite 存在
          if ! command -v vite &> /dev/null && ! [ -f node_modules/.bin/vite ]; then
            echo '⚠️  Vite 未找到，正在安装...'
            npm install -D vite @vitejs/plugin-vue
          fi
          
          # 确保 Electron 工具链存在
          if ! [ -f node_modules/.bin/electron-builder ]; then
            echo '⚠️  Electron 未找到，正在安装...'
            npm install -D electron electron-builder
          fi
          
          echo '🔍 验证工具:'
          npx vite --version 2>/dev/null || echo '❌ Vite 不可用'
          npx electron --version 2>/dev/null || echo '❌ Electron 不可用'
          npx electron-builder --version 2>/dev/null || echo '❌ Electron Builder 不可用'
      
      - name: 确保所有必要脚本存在
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            if (!pkg.scripts) pkg.scripts = {};
            if (!pkg.scripts.build) pkg.scripts.build = 'npx vite build';
            if (!pkg.scripts['electron:build']) pkg.scripts['electron:build'] = 'npm run build && npx electron-builder';
            if (!pkg.scripts['electron:dev']) pkg.scripts['electron:dev'] = 'npm run build && npx electron .';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
            console.log('✅ 已确保所有必要脚本存在');
          "
      
      - name: 创建Electron源文件（如缺失）
        shell: bash
        run: |
          mkdir -p electron
          if [ ! -f "electron/main.js" ]; then
            cat > electron/main.js << 'EOF'
          const { app, BrowserWindow, Menu, shell } = require('electron');
          const path = require('path');
          
          let mainWindow;
          
          function createWindow() {
            mainWindow = new BrowserWindow({
              width: 1200,
              height: 800,
              webPreferences: {
                preload: path.join(__dirname, 'preload.js'),
                nodeIntegration: false,
                contextIsolation: true,
              },
              icon: path.join(__dirname, '../public/favicon.ico'),
              show: false,
            });
          
            const isDev = !app.isPackaged;
            const startUrl = isDev
              ? 'http://localhost:4173'
              : `file://${path.join(__dirname, '../dist/index.html')}`;
          
            mainWindow.loadURL(startUrl);
            mainWindow.once('ready-to-show', () => mainWindow.show());
            mainWindow.webContents.setWindowOpenHandler(({ url }) => {
              shell.openExternal(url);
              return { action: 'deny' };
            });
            Menu.setApplicationMenu(null);
          }
          
          app.whenReady().then(createWindow);
          app.on('window-all-closed', () => { if (process.platform !== 'darwin') app.quit(); });
          app.on('activate', () => { if (BrowserWindow.getAllWindows().length === 0) createWindow(); });
          EOF
            echo '✅ 已创建 electron/main.js'
          fi
          
          if [ ! -f "electron/preload.js" ]; then
            cat > electron/preload.js << 'EOF'
          const { contextBridge } = require('electron');
          contextBridge.exposeInMainWorld('electronAPI', {
            platform: process.platform,
          });
          EOF
            echo '✅ 已创建 electron/preload.js'
          fi
      
      - name: 构建Electron应用
        run: npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - uses: actions/upload-artifact@v4
        with:
          name: electron-${{ matrix.os }}
          path: release/

  # 3. 构建Android APK
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: 安装依赖
        shell: bash
        run: |
          npm install || npm install --legacy-peer-deps
          if ! command -v vite &> /dev/null && ! [ -f node_modules/.bin/vite ]; then
            npm install -D vite @vitejs/plugin-vue
          fi
      
      - name: 构建Vue
        run: npm run build
      
      - name: 同步Capacitor
        run: npx cap sync android
      
      - name: 构建APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
      
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/release/*.apk

  # 4. 创建GitHub Release
  create-release:
    needs: [build-web, build-electron, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: 创建Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: RELEASE_NOTES.md
          files: |
            artifacts/**/*.zip
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
