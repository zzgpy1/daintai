name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '自定义版本号 (留空则自动生成)'
        required: false
        default: ''
      create_release:
        description: '是否创建 GitHub Release'
        type: boolean
        required: false
        default: true
      build_docker:
        description: '是否构建 Docker 镜像'
        type: boolean
        required: false
        default: false

permissions:
  contents: write
  actions: read

env:
  NODE_VERSION: 20
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 验证项目结构
        run: |
          echo "检查关键文件..."
          test -f src/main.ts || (echo "src/main.ts 不存在" && exit 1)
          test -f index.html || (echo "index.html 不存在" && exit 1)
          echo "验证通过"

  # ============================================
  # 构建 Web 产物
  # ============================================
  build-web:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: 安装依赖
        run: npm install --no-audit --no-fund
      - name: 构建 Web
        run: npm run build
      - name: 验证构建产物
        run: |
          ls -la dist/
          test -f dist/index.html || (echo "dist/index.html 不存在" && exit 1)
      - name: 打包 Web 产物
        run: |
          cd dist
          zip -r ../web-dist.zip .
          cd ..
          ls -la web-dist.zip
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web-dist.zip

  # ============================================
  # 构建 Android APK
  # ============================================
  build-android:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 生成 Debug 签名密钥
        run: |
          mkdir -p android/app
          cd android/app
          if [ ! -f "debug.keystore" ]; then
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug, O=Android, C=US"
          fi

      - name: 安装依赖
        run: npm install --no-audit --no-fund

      - name: 构建 Web
        run: npm run build

      - name: 添加 Android 平台
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: 同步 Capacitor
        run: npx cap sync android

      - name: 构建 Debug APK（已签名）
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 构建 Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: 收集 APK 产物
        id: collect_apk
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          else
            VERSION="v$(date +'%Y.%m.%d-%H%M%S')"
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT

          mkdir -p apk-outputs

          DEBUG_APK="android/app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$DEBUG_APK" ]; then
            cp "$DEBUG_APK" "apk-outputs/global-radio-${VERSION}-debug.apk"
            echo "Debug APK: global-radio-${VERSION}-debug.apk"
          fi

          RELEASE_APK="android/app/build/outputs/apk/release/app-release.apk"
          if [ -f "$RELEASE_APK" ]; then
            cp "$RELEASE_APK" "apk-outputs/global-radio-${VERSION}.apk"
            echo "Release APK: global-radio-${VERSION}.apk"
          else
            # 如果 Release 失败，使用 Debug 作为备选
            if [ -f "$DEBUG_APK" ]; then
              cp "$DEBUG_APK" "apk-outputs/global-radio-${VERSION}.apk"
              echo "⚠️ 使用 Debug APK 作为 Release 备选"
            fi
          fi

          echo "APK 产物列表："
          ls -la apk-outputs/

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: apk-outputs/*.apk

  # ============================================
  # 构建 Windows EXE
  # ============================================
  build-windows:
    runs-on: windows-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装依赖
        run: |
          npm install --no-audit --no-fund
          npm install electron --no-audit --no-fund

      - name: 构建 Web
        run: npm run build

      - name: 验证构建产物
        run: |
          if (Test-Path dist/index.html) {
            Write-Host "dist/index.html 存在"
          } else {
            Write-Host "dist/index.html 不存在"
            exit 1
          }

      - name: 获取版本号
        id: get_version
        run: |
          if ([string]::IsNullOrEmpty("${{ github.event.inputs.tag }}")) {
            $VERSION = "v$(Get-Date -Format 'yyyy.MM.dd-HHmmss')"
          } else {
            $VERSION = "${{ github.event.inputs.tag }}"
          }
          Write-Host "VERSION=$VERSION"
          echo "VERSION=$VERSION" >> $env:GITHUB_OUTPUT

      - name: 检查 Electron 配置
        run: |
          if (Test-Path electron/main.js) {
            Write-Host "electron/main.js 存在"
          } else {
            Write-Host "electron/main.js 不存在，跳过"
            exit 0
          }

      - name: 构建 Windows EXE（便携版）
        if: hashFiles('electron/main.js') != ''
        run: |
          Remove-Item -Recurse -Force -ErrorAction SilentlyContinue release/
          npm run electron:build -- --win portable
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 收集 Windows 产物
        if: hashFiles('electron/main.js') != ''
        run: |
          $VERSION = "${{ steps.get_version.outputs.VERSION }}"
          New-Item -ItemType Directory -Force -Path exe-outputs
          Get-ChildItem -Path release/ -Recurse -Filter "*.exe" | ForEach-Object {
            if ($_.Length -gt 1MB) {
              $destName = "global-radio-${VERSION}-win-portable.exe"
              Copy-Item -Path $_.FullName -Destination "exe-outputs/$destName"
              Write-Host "EXE: $destName"
            }
          }

      - uses: actions/upload-artifact@v4
        if: hashFiles('electron/main.js') != ''
        with:
          name: windows-exe
          path: exe-outputs/*.exe

  # ============================================
  # 构建 Docker 镜像
  # ============================================
  build-docker:
    runs-on: ubuntu-latest
    needs: build-web
    if: github.event.inputs.build_docker == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: 下载 Web 产物
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: .
      - name: 解压 Web 产物
        run: |
          unzip web-dist.zip -d dist
          rm web-dist.zip
          ls -la dist/
      - name: 检查 Dockerfile
        run: test -f Dockerfile || (echo "Dockerfile 不存在" && exit 1)
      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: 获取版本号
        id: get_version
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          else
            VERSION="v$(date +'%Y.%m.%d-%H%M%S')"
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
      - name: 构建并推送 AMD64 镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/global-radio:latest
            ${{ secrets.DOCKER_USERNAME }}/global-radio:${{ steps.get_version.outputs.VERSION }}
      - name: 构建并推送 ARM64 镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/global-radio-arm64:latest
            ${{ secrets.DOCKER_USERNAME }}/global-radio-arm64:${{ steps.get_version.outputs.VERSION }}

  # ============================================
  # 创建 GitHub Release
  # ============================================
  create-release:
    needs: [build-web, build-android, build-windows]
    runs-on: ubuntu-latest
    if: |
      github.event.inputs.create_release == 'true' ||
      startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: 获取版本号
        id: get_version
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          else
            VERSION="v$(date +'%Y.%m.%d-%H%M%S')"
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "RELEASE_TAG=${VERSION}" >> $GITHUB_OUTPUT
          echo "版本号: ${VERSION}"

      - name: 删除已存在的 Release
        run: |
          TAG="${{ steps.get_version.outputs.RELEASE_TAG }}"
          echo "检查 Release ${TAG} 是否已存在..."
          RESPONSE=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${TAG}")
          
          if echo "$RESPONSE" | grep -q '"id":'; then
            RELEASE_ID=$(echo "$RESPONSE" | grep -o '"id":[0-9]*' | head -1 | cut -d: -f2)
            echo "删除已存在的 Release: ${TAG} (ID: ${RELEASE_ID})"
            curl -X DELETE \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/releases/${RELEASE_ID}"
            sleep 3
          else
            echo "Release ${TAG} 不存在"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 整理产物
        id: prepare_assets
        run: |
          mkdir -p release-assets
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          
          echo "查找所有产物..."
          find artifacts/ -type f -print
          
          APK_FILE=$(find artifacts/ -type f -name "*.apk" | head -1)
          if [ -n "$APK_FILE" ]; then
            cp "$APK_FILE" "release-assets/global-radio-${VERSION}.apk"
            echo "APK: global-radio-${VERSION}.apk"
          fi
          
          EXE_FILE=$(find artifacts/ -type f -name "*.exe" | head -1)
          if [ -n "$EXE_FILE" ]; then
            cp "$EXE_FILE" "release-assets/global-radio-${VERSION}-win-portable.exe"
            echo "EXE: global-radio-${VERSION}-win-portable.exe"
          fi
          
          ZIP_FILE=$(find artifacts/ -type f -name "*.zip" | head -1)
          if [ -n "$ZIP_FILE" ]; then
            cp "$ZIP_FILE" "release-assets/web-dist-${VERSION}.zip"
            echo "ZIP: web-dist-${VERSION}.zip"
          fi
          
          echo "release-assets 目录内容："
          ls -la release-assets/

      - name: 生成 Release Notes
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          DATE=$(date +'%Y年%m月%d日 %H:%M:%S')
          cat > RELEASE_NOTES.md << EOF
          # 全球电台 v${VERSION}

          ## 📅 构建时间
          ${DATE}

          ## 📦 下载说明

          ### 📱 Android
          - 下载 APK 文件安装到手机

          ### 💻 Windows
          - 下载 EXE 文件（便携版，无需安装）

          ### 🌐 Web
          - 在线演示: https://aabb.live

          ### 🐳 Docker
          - docker pull ${{ secrets.DOCKER_USERNAME }}/global-radio:${VERSION}

          感谢使用全球电台！
          EOF
          cat RELEASE_NOTES.md

      - name: 创建 Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ steps.get_version.outputs.RELEASE_TAG }}
          release_name: 全球电台 v${{ steps.get_version.outputs.VERSION }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传 APK
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: release-assets/global-radio-${{ steps.get_version.outputs.VERSION }}.apk
          asset_name: global-radio-${{ steps.get_version.outputs.VERSION }}.apk
          asset_content_type: application/vnd.android.package-archive
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传 Windows EXE
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: release-assets/global-radio-${{ steps.get_version.outputs.VERSION }}-win-portable.exe
          asset_name: global-radio-${{ steps.get_version.outputs.VERSION }}-win-portable.exe
          asset_content_type: application/vnd.microsoft.portable-executable
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传 Web 产物
        if: hashFiles('release-assets/web-dist-${{ steps.get_version.outputs.VERSION }}.zip') != ''
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: release-assets/web-dist-${{ steps.get_version.outputs.VERSION }}.zip
          asset_name: web-dist-${{ steps.get_version.outputs.VERSION }}.zip
          asset_content_type: application/zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
