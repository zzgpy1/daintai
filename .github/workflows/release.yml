name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '版本号 (如 v1.0.0)'
        required: true
        default: 'v1.0.0'
      create_release:
        description: '是否创建 GitHub Release'
        type: boolean
        required: false
        default: true
      build_docker:
        description: '是否构建 Docker 镜像（需要配置 Docker Hub 密钥）'
        type: boolean
        required: false
        default: false

permissions:
  contents: write
  actions: read
  checks: read
  metadata: read

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  NODE_VERSION: 20

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 验证项目结构
        run: |
          echo "📂 检查关键文件..."
          test -f src/main.ts || (echo "❌ src/main.ts 不存在" && exit 1)
          test -f index.html || (echo "❌ index.html 不存在" && exit 1)
          echo "✅ 验证通过"

  build-web:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: 安装依赖
        run: npm install --no-audit --no-fund
      - name: 构建 Web
        run: npm run build
      - name: 验证构建产物
        run: test -f dist/index.html || (echo "❌ dist/index.html 不存在" && exit 1)
      - name: 打包 Web 产物
        run: |
          cd dist
          zip -r ../web-dist.zip .
          cd ..
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web-dist.zip

  build-android:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: 安装依赖
        run: npm install --no-audit --no-fund
      - name: 构建 Web
        run: npm run build
      - name: 添加 Android 平台
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
      - name: 同步 Capacitor
        run: npx cap sync android
      - name: 构建 APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
      - name: 验证并重命名 APK
        run: |
          APK_PATH="android/app/build/outputs/apk/release"
          VERSION="${{ github.event.inputs.tag }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(echo ${GITHUB_REF#refs/tags/})
          fi
          if [ -z "$VERSION" ]; then
            VERSION="dev"
          fi
          test -f $APK_PATH/app-release.apk || (echo "❌ APK 不存在" && exit 1)
          cp $APK_PATH/app-release.apk $APK_PATH/global-radio-${VERSION}.apk
          echo "✅ APK: global-radio-${VERSION}.apk"
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/release/*.apk

  build-docker:
    runs-on: ubuntu-latest
    needs: build-web
    if: |
      github.event.inputs.build_docker == 'true' &&
      secrets.DOCKER_USERNAME != '' &&
      secrets.DOCKER_PASSWORD != ''
    steps:
      - uses: actions/checkout@v4
      - name: 下载 Web 产物
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: .
      - name: 解压
        run: |
          unzip web-dist.zip -d dist
          rm web-dist.zip
      - name: 检查 Dockerfile
        run: test -f Dockerfile || (echo "❌ Dockerfile 不存在" && exit 1)
      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: 获取版本号
        id: get_version
        run: |
          VERSION="${{ github.event.inputs.tag }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(echo ${GITHUB_REF#refs/tags/})
          fi
          if [ -z "$VERSION" ]; then
            VERSION="dev"
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
      - name: 构建并推送镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            superneed/global-radio:latest
            superneed/global-radio:${{ steps.get_version.outputs.VERSION }}

  create-release:
    needs: [build-web, build-android]
    runs-on: ubuntu-latest
    if: |
      github.event.inputs.create_release == 'true' ||
      startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - name: 整理产物
        run: |
          mkdir -p release-assets
          find artifacts/ -type f -name "*.apk" -exec cp {} release-assets/ \;
          find artifacts/ -type f -name "*.zip" -exec cp {} release-assets/ \;
          echo "📦 产物列表："
          ls -la release-assets/
      - name: 获取版本号
        id: get_version
        run: |
          VERSION="${{ github.event.inputs.tag }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(echo ${GITHUB_REF#refs/tags/})
          fi
          if [ -z "$VERSION" ]; then
            VERSION="dev-$(date +'%Y%m%d%H%M%S')"
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "RELEASE_TAG=${VERSION}" >> $GITHUB_OUTPUT
      - name: 生成 Release Notes
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          cat > RELEASE_NOTES.md << EOF
          # 全球电台 v${VERSION}

          ## 📦 下载说明

          ### 📱 Android
          - 下载 APK 文件安装到手机

          ### 🌐 Web
          - 在线演示: https://aabb.live

          ---
          感谢使用全球电台！
          EOF
      - name: 检查 Release 是否存在
        id: check_release
        run: |
          TAG="${{ steps.get_version.outputs.RELEASE_TAG }}"
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${TAG}")
          if [ "$RESPONSE" = "200" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
      - name: 创建 Release
        if: steps.check_release.outputs.exists == 'false'
        id: create_release_step
        uses: actions/create-release@v1
        with:
          tag_name: ${{ steps.get_version.outputs.RELEASE_TAG }}
          release_name: 全球电台 v${{ steps.get_version.outputs.VERSION }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: 上传 APK
        if: steps.check_release.outputs.exists == 'false' && steps.create_release_step.outputs.upload_url != ''
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release_step.outputs.upload_url }}
          asset_path: release-assets/global-radio-${{ steps.get_version.outputs.VERSION }}.apk
          asset_name: global-radio-${{ steps.get_version.outputs.VERSION }}.apk
          asset_content_type: application/vnd.android.package-archive
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
