name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 v1.0.0)'
        required: true
        type: string

env:
  NODE_VERSION: 20

permissions:
  contents: write
  packages: write

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 获取版本号
        id: get-version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 版本: $VERSION"

      - name: 检查 lockfile
        shell: bash
        run: |
          if [ ! -f package-lock.json ]; then
            npm install --package-lock-only --no-audit --no-fund
          fi

      - name: 缓存 node_modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: 安装依赖
        shell: bash
        run: |
          if [ ! -d "node_modules/vite" ]; then
            echo "📦 安装依赖..."
            npm ci --no-audit --no-fund --legacy-peer-deps || \
            npm install --no-audit --no-fund --legacy-peer-deps
          fi
          test -d node_modules/vite || (echo "❌ vite 未安装" && exit 1)
          echo "✅ 依赖安装完成"

  build-web:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 恢复 node_modules
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: 确保依赖存在
        shell: bash
        run: |
          if [ ! -d "node_modules/vite" ]; then
            npm install --no-audit --no-fund --legacy-peer-deps
          fi
          test -d node_modules/vite || (echo "❌ vite 未安装" && exit 1)

      - name: 构建 Web
        shell: bash
        run: npm run build

      - name: 验证构建产物
        shell: bash
        run: |
          test -f dist/index.html || (echo "❌ 构建失败" && exit 1)
          echo "✅ 构建成功"

      - name: 上传 Web 产物
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/
          retention-days: 7

  build-electron:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    needs: setup
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 恢复 node_modules
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: 确保依赖存在
        shell: bash
        run: |
          if [ ! -d "node_modules/vite" ]; then
            npm install --no-audit --no-fund --legacy-peer-deps
          fi
          test -d node_modules/vite || (echo "❌ vite 未安装" && exit 1)
          test -f electron/main.js || (echo "❌ electron/main.js 不存在" && exit 1)

      - name: 构建 Vue
        shell: bash
        run: npm run build

      - name: 构建 Electron (${{ matrix.os }})
        shell: bash
        run: npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 验证产物
        shell: bash
        run: |
          ls -la release/ || echo "release 目录不存在"
          find release -type f \( -name "*.AppImage" -o -name "*.deb" -o -name "*.exe" -o -name "*.dmg" \) 2>/dev/null | head -5

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: electron-${{ matrix.os }}
          path: release/
          retention-days: 7

  build-android:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 恢复 node_modules
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: 确保依赖存在
        shell: bash
        run: |
          if [ ! -d "node_modules/vite" ]; then
            npm install --no-audit --no-fund --legacy-peer-deps
          fi
          test -d node_modules/vite || (echo "❌ vite 未安装" && exit 1)

      - name: 构建 Vue
        shell: bash
        run: npm run build

      - name: 初始化 Capacitor
        shell: bash
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: 同步 Capacitor
        shell: bash
        run: npx cap sync android

      - name: 构建 APK
        shell: bash
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 7

  create-release:
    needs: [setup, build-web, build-electron, build-android]
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 生成 Release Notes
        shell: bash
        run: |
          VERSION="${{ needs.setup.outputs.version }}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          if [ -z "$VERSION" ] || [ "$VERSION" = "refs/tags/v" ]; then
            VERSION="$(date +'%Y%m%d-%H%M%S')"
          fi

          cat > RELEASE_NOTES.md << EOF
          # 🌍 全球电台 v${VERSION}

          ## 📦 下载说明

          ### 🖥️ Windows
          - global-radio-${VERSION}-win-setup.exe
          - global-radio-${VERSION}-win-portable.exe

          ### 🍎 macOS
          - global-radio-${VERSION}-mac.dmg
          - global-radio-${VERSION}-mac.zip

          ### 🐧 Linux
          - global-radio-${VERSION}-linux.AppImage
          - global-radio-${VERSION}-linux.deb

          ### 📱 Android
          - app-release-${VERSION}.apk

          ---
          感谢使用全球电台！
          EOF

      - name: 创建 Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.apk
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
