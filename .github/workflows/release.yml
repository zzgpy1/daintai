name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '手动指定标签 (如 v1.0.0)'
        required: false
        default: ''

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  NODE_VERSION: 20
  DOCKER_IMAGE: superneed/global-radio
  DOCKER_IMAGE_ARM64: superneed/global-radio-arm64

jobs:
  # 1. 验证项目结构
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 验证项目结构
        run: |
          echo "📂 检查关键文件..."
          test -f src/main.ts || (echo "❌ src/main.ts 不存在" && exit 1)
          test -f index.html || (echo "❌ index.html 不存在" && exit 1)
          echo "✅ 验证通过"

  # 2. 构建 Web 产物
  build-web:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: 安装依赖
        run: npm install --no-audit --no-fund
      - name: 构建 Web
        run: npm run build
      - name: 验证构建产物
        run: test -f dist/index.html || (echo "❌ dist/index.html 不存在" && exit 1)
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/

  # 3. 构建 Android APK
  build-android:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: 安装依赖
        run: npm install --no-audit --no-fund
      - name: 构建 Web
        run: npm run build
      - name: 添加 Android 平台
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
      - name: 同步 Capacitor
        run: npx cap sync android
      - name: 构建 APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/release/*.apk

  # 4. 构建 Docker 镜像（可选，仅在 tag 推送时触发）
  build-docker:
    runs-on: ubuntu-latest
    needs: build-web
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - name: 下载 Web 构建产物
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist/
      - name: 检查 Dockerfile
        run: |
          if [ ! -f "Dockerfile" ]; then
            echo "⚠️ Dockerfile 不存在，跳过 Docker 构建"
            exit 0
          fi
      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: 构建并推送 AMD64 镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.ref_name }}
      - name: 构建并推送 ARM64 镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE_ARM64 }}:latest
            ${{ env.DOCKER_IMAGE_ARM64 }}:${{ github.ref_name }}

  # 5. 创建 GitHub Release（不依赖 Docker 构建）
  create-release:
    needs: [build-web, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - name: 整理产物
        run: |
          mkdir -p release-assets
          find artifacts/ -type f -exec cp {} release-assets/ \;
          echo "📦 产物列表："
          ls -la release-assets/ || echo "⚠️ 没有产物文件"
      - name: 生成 Release Notes
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          cat > RELEASE_NOTES.md << 'EOF'
          # 全球电台 v${VERSION}

          ## 📦 下载说明

          ### 📱 Android
          - `app-release-${VERSION}.apk` - APK 安装包

          ### 🐳 Docker
          - `docker pull superneed/global-radio:${VERSION}`
          - `docker pull superneed/global-radio-arm64:${VERSION}`

          ### 🌐 Web
          - 在线演示: https://aabb.live

          ---
          感谢使用全球电台！
          EOF
          sed -i "s/\${VERSION}/${VERSION}/g" RELEASE_NOTES.md
          cat RELEASE_NOTES.md
      - name: 创建 Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
          files: |
            release-assets/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
