version: '3.8'

services:
  global-radio-web:
    image: superneed/global-radio:latest
    container_name: global-radio-web
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      - TZ=Asia/Shanghai
      - VIRTUAL_HOST=radio.yourdomain.com
      - LETSENCRYPT_HOST=radio.yourdomain.com
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    networks:
      - web

networks:
  web:
    external: true
